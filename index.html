<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllsvenskanAI</title>
<meta name="description" content="AllsvenskanAI — Statistik, spelardata, övergångar och marknadsvärden för Allsvenskan. Karriärstatistik för alla spelare. Live-resultat och tabell.">
<meta name="keywords" content="Allsvenskan, svensk fotboll, statistik, spelare, övergångar, marknadsvärden, live, tabell">
<meta property="og:title" content="AllsvenskanAI — Allsvenskan statistik">
<meta property="og:description" content="Statistik, spelardata, övergångar och marknadsvärden för Allsvenskan.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://allsvenskanai.se">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="AllsvenskanAI">
<meta name="twitter:description" content="Allsvenskan statistik, spelardata och övergångar.">
<link rel="canonical" href="https://allsvenskanai.se">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4AF37;--gold-light:#F0D060;--gold-dim:rgba(212,175,55,.15);
  --dark:#080A0E;--dark2:#0F1218;--dark3:#161C26;--dark4:#1E2535;--dark5:#252E40;
  --border:rgba(212,175,55,0.08);--border-hi:rgba(212,175,55,0.3);
  --text:#EEF0F4;--text2:#B0B8C8;--muted:#5A6480;
  --red:#C84B4B;--green:#3A9E6A;--blue:#3D7EBF;
  --radius:3px;
}

/* BASE */
html{scroll-behavior:smooth}
body{
  font-family:'Barlow',sans-serif;
  background:var(--dark);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  /* Subtle noise texture */
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* HEADER */
header{
  background:rgba(8,10,14,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:58px;display:flex;align-items:center;padding:0 2rem;gap:1.5rem;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  color:var(--text);cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:8px;text-decoration:none;
}
.logo-badge{
  background:var(--gold);color:var(--dark);
  font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  padding:3px 7px;border-radius:2px;
}
.logo em{color:var(--gold);font-style:normal}
.nav-pills{display:flex;gap:0;margin-left:auto}
.np{
  background:none;border:none;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  padding:8px 14px;cursor:pointer;
  transition:color .2s;
  position:relative;
}
.np::after{
  content:'';position:absolute;bottom:0;left:50%;right:50%;
  height:2px;background:var(--gold);
  transition:left .2s, right .2s;
}
.np:hover{color:var(--text)}
.np.active{color:var(--gold)}
.np.active::after{left:14px;right:14px}

/* MAIN */
main{flex:1;max-width:1280px;width:100%;margin:0 auto;padding:2rem 2rem 4rem}

/* PAGE HEADER */
.pg-header{
  margin-bottom:2rem;
  padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:baseline;gap:14px;
}
.pg-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:42px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  color:var(--text);line-height:1;
}
.pg-title em{color:var(--gold);font-style:normal}
.pg-sub{font-size:13px;color:var(--muted);font-weight:400;letter-spacing:.5px}
.back{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:6px;margin-bottom:1.25rem;padding:0;
  transition:color .2s;
}
.back:hover{color:var(--text)}
.back::before{content:'←';font-size:16px}

/* TEAM GRID */
.tgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:2px;
}
.tcard{
  background:var(--dark2);
  cursor:pointer;
  transition:background .2s;
  display:flex;flex-direction:column;align-items:center;
  gap:12px;text-align:center;
  padding:1.5rem 1rem;
  position:relative;overflow:hidden;
}
.tcard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,55,.06) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.tcard:hover{background:var(--dark3)}
.tcard:hover::before{opacity:1}
.tcard img{
  width:60px;height:60px;object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  transition:transform .3s;
}
.tcard:hover img{transform:scale(1.08) translateY(-2px)}
.tcard .tn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text2);transition:color .2s;
}
.tcard:hover .tn{color:var(--text)}

/* PROFILE CARD */
.profile{
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:1.5rem;
  overflow:hidden;
  position:relative;
}
.profile-inner{
  padding:1.75rem 2rem;
  display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap;
  position:relative;z-index:1;
}
.profile-bg{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,55,.04) 0%,transparent 50%);
  pointer-events:none;
}
.p-img{
  width:88px;height:88px;object-fit:contain;flex-shrink:0;
  background:var(--dark3);border-radius:var(--radius);padding:8px;
  border:1px solid var(--border);
}
.p-photo{
  width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0;
  background:var(--dark3);border:2px solid var(--border);
}
.p-body{flex:1;min-width:180px}
.p-body h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text);line-height:1;margin-bottom:.5rem;
}
.p-meta{
  font-size:12px;color:var(--muted);
  display:flex;flex-wrap:wrap;gap:0 16px;line-height:2;
  margin-bottom:.75rem;
  font-weight:500;letter-spacing:.3px;
}
.p-meta span{display:flex;align-items:center;gap:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  background:var(--dark3);border:1px solid var(--border);
  padding:.6rem 1rem;text-align:center;min-width:72px;
  border-radius:var(--radius);
}
.pill .pn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;font-weight:800;color:var(--gold);line-height:1;
}
.pill .pl{
  font-size:9px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted);margin-top:3px;font-weight:600;
}
.season-label{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:.4rem;display:block;
}

/* TABS */
.tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  margin-bottom:1.5rem;
  gap:0;
}
.tab{
  background:none;border:none;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:10px 18px;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;
  white-space:nowrap;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* TABLE */
.tw{
  background:var(--dark2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;margin-bottom:1.5rem;
}
table{width:100%;border-collapse:collapse}
thead{background:var(--dark3)}
th{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  font-size:13px;padding:9px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);
  color:var(--text);font-weight:400;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
tr.link{cursor:pointer}
tr.total-row td{
  background:var(--dark3);font-weight:600;
  border-top:1px solid var(--border);
}
tr.season-row td{border-left:2px solid var(--gold)}
.num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:700;color:var(--gold);
}
.pos-tag{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  background:var(--dark4);border-radius:2px;padding:3px 8px;color:var(--muted);
}
.pcell{display:flex;align-items:center;gap:10px}
.pcell img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--dark4);flex-shrink:0}
.pcell .pn{font-weight:500;font-size:13px}
.pcell .ps{font-size:11px;color:var(--muted)}
.pos-sep td{
  background:var(--dark);
  color:var(--gold);
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:6px 14px;border-left:none!important;
  border-bottom:1px solid var(--border)!important;
}
.form-row{display:flex;gap:3px}
.fd{width:8px;height:8px;border-radius:50%}
.fw{background:var(--green)}.fd-d{background:#333}.fl{background:var(--red)}

/* TRANSFER BADGE */
.fee-tag{font-size:10px;padding:3px 9px;border-radius:2px;white-space:nowrap;flex-shrink:0;font-weight:600;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}

/* RATING */
.rg{color:#3A9E6A;font-weight:700}
.ry{color:var(--gold);font-weight:700}
.rr{color:#C84B4B;font-weight:700}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:5rem;color:var(--muted);font-size:13px;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:13px;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase}
.err{
  background:rgba(200,75,75,.06);border:1px solid rgba(200,75,75,.2);
  border-radius:var(--radius);padding:1rem 1.25rem;color:#E07070;
  font-size:13px;margin:.75rem 0;line-height:1.7;
}
.share{
  background:none;border:1px solid var(--border);
  border-radius:2px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:5px 10px;cursor:pointer;margin-left:auto;
  transition:border-color .2s,color .2s;
}
.share:hover{border-color:var(--border-hi);color:var(--text)}

/* AI CHAT */
.chat-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chat-head{
  background:var(--dark3);border-bottom:1px solid var(--border);
  padding:.75rem 1.25rem;display:flex;align-items:center;gap:8px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-msgs{max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;padding:1.25rem}
.mu,.ma{display:flex;flex-direction:column;gap:4px}
.mrole{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.ma .mrole{color:rgba(212,175,55,.5)}
.mb{
  background:var(--dark3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;font-size:13px;line-height:1.7;
}
.mu .mb{background:var(--dark4);border-color:rgba(212,175,55,.12)}
.chat-in{border-top:1px solid var(--border);padding:1rem 1.25rem;display:flex;gap:8px}
.chat-in textarea{
  flex:1;background:var(--dark3);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:13px;
  padding:9px 12px;outline:none;resize:none;
  min-height:38px;max-height:110px;line-height:1.5;
  transition:border-color .2s;
}
.chat-in textarea:focus{border-color:var(--border-hi)}
.chat-in textarea::placeholder{color:var(--muted)}
.send{
  background:var(--gold);color:var(--dark);border:none;
  border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:9px 18px;cursor:pointer;white-space:nowrap;transition:opacity .2s;
}
.send:hover{opacity:.85}
.send:disabled{opacity:.3;cursor:not-allowed}
.chips{display:flex;gap:5px;flex-wrap:wrap;padding:.75rem 1.25rem;border-top:1px solid var(--border)}
.chip{
  background:var(--dark3);border:1px solid var(--border);
  border-radius:2px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;cursor:pointer;transition:border-color .2s,color .2s;
}
.chip:hover{border-color:var(--border-hi);color:var(--text)}
.ai-content{font-size:13px;line-height:1.7}
.ai-content table{margin:8px 0;border-collapse:collapse;width:100%}
.ai-content td,.ai-content th{padding:6px 12px;border:1px solid var(--border);font-size:12px}
.ai-content th{background:var(--dark3);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase}
.ai-content strong{color:var(--gold)}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.7;animation:bns 1.1s infinite;display:inline-block;margin-right:3px}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bns{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* AI BUTTON */
.ai-btn{
  background:var(--gold-dim);border:1px solid var(--border-hi);
  border-radius:var(--radius);color:var(--gold);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:7px 14px;cursor:pointer;transition:background .2s;
}
.ai-btn:hover{background:rgba(212,175,55,.22)}

/* STANDINGS COLORS */
.pos-cl{border-left:3px solid #4A90D9}
.pos-el{border-left:3px solid #E87722}
.pos-rel{border-left:3px solid var(--red)}

/* MOBILE NAV */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(8,10,14,.97);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  height:58px;z-index:200;
  justify-content:space-around;align-items:center;
  padding:0 .5rem;
  padding-bottom:env(safe-area-inset-bottom);
}
.mnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:.4rem .6rem;border-radius:2px;cursor:pointer;
  transition:color .2s;min-width:48px;
}
.mnav-btn .icon{font-size:18px;line-height:1}
.mnav-btn.active{color:var(--gold)}

/* LIVE */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(200,75,75,.12);color:#E07070;
  border:1px solid rgba(200,75,75,.25);
  border-radius:2px;font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 8px;animation:livepulse 2s infinite;
}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#E07070;display:inline-block;animation:livepulse 1s infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.5}}
.match-card{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.25rem;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;
  transition:border-color .2s;cursor:default;
}
.match-card.live{border-color:rgba(200,75,75,.3);background:rgba(200,75,75,.04)}
.match-card.upcoming{opacity:.7}
.match-team{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.5px}
.match-team.away{flex-direction:row-reverse;text-align:right}
.match-team img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.match-score{text-align:center}
.match-score .score{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:2px;color:var(--text);line-height:1}
.match-score .score.win-home{color:var(--green)}
.match-score .time{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:8px;margin-bottom:1.5rem}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* NYHETER */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:1.5rem}
.news-card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;transition:border-color .2s}
.news-card:hover{border-color:var(--border-hi)}
.news-source{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.news-title{font-size:14px;font-weight:500;line-height:1.4;color:var(--text);margin-bottom:.4rem}
.news-date{font-size:11px;color:var(--muted)}
/* PAGE ENTER ANIMATION */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
main > *{animation:fadeUp .3s ease both}

/* START PAGE */
.start-hero{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:var(--radius);
  padding:3rem 2rem;text-align:center;margin-bottom:2rem;
  position:relative;overflow:hidden;
}
.start-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.08) 0%,transparent 65%);
  pointer-events:none;
}
.start-wordmark{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(42px,8vw,80px);font-weight:900;
  letter-spacing:4px;text-transform:uppercase;
  color:var(--text);line-height:1;margin-bottom:.5rem;
  position:relative;
}
.start-wordmark span{color:var(--gold)}
.start-sub{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);
}
.start-teams-section{margin-bottom:2rem}
.start-ai-section{margin-bottom:2rem}
.start-section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:.75rem;
  display:flex;align-items:center;gap:8px;
}
.start-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.start-tgrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;
}
.start-tcard{
  background:var(--dark2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  gap:10px;padding:1.5rem 1rem;text-align:center;
  transition:background .2s;position:relative;overflow:hidden;
}
.start-tcard::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(212,175,55,.06) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.start-tcard:hover{background:var(--dark3)}
.start-tcard:hover::before{opacity:1}
.start-tcard img{
  width:64px;height:64px;object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  transition:transform .3s;
}
.start-tcard:hover img{transform:scale(1.08) translateY(-2px)}
.start-tn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text2);transition:color .2s;line-height:1.2;
}
.start-tcard:hover .start-tn{color:var(--text)}

/* PAGINATION */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.page-btn{
  background:var(--dark2);border:1px solid var(--border);
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;padding:7px 14px;border-radius:var(--radius);
  cursor:pointer;transition:background .15s,color .15s,border-color .15s;
}
.page-btn:hover{background:var(--dark3);color:var(--text);border-color:var(--border-hi)}
.page-btn.active{background:var(--gold);color:var(--dark);border-color:var(--gold)}

/* STAT TABS */
.stat-tabs{
  display:flex;gap:4px;flex-wrap:wrap;
  background:var(--dark2);border:1px solid var(--border);
  border-radius:var(--radius);padding:6px;
}
.stat-tab{
  background:none;border:none;
  color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:6px 12px;border-radius:2px;cursor:pointer;
  transition:background .15s,color .15s;white-space:nowrap;
}
.stat-tab:hover{background:var(--dark3);color:var(--text)}
.stat-tab.active{background:var(--gold);color:var(--dark)}

/* MOBILE */
@media(max-width:768px){
  header{padding:0 1rem;height:52px}
  .logo{font-size:17px}
  .nav-pills{display:none}
  main{padding:1rem 1rem 72px}
  .pg-title{font-size:28px}
  .tgrid{grid-template-columns:repeat(3,1fr);gap:2px}
  .start-tgrid{grid-template-columns:repeat(4,1fr);gap:2px}
  .start-tcard{padding:.85rem .4rem;gap:7px}
  .start-tcard img{width:36px;height:36px}
  .start-tn{font-size:10px;letter-spacing:0}
  .start-hero{padding:1.75rem 1rem;margin-bottom:1.25rem}
  .start-wordmark{font-size:36px}
  .start-sub{font-size:11px}
  .tcard{padding:1rem .6rem;gap:8px}
  .tcard img{width:44px;height:44px}
  .tcard .tn{font-size:11px}
  .profile-inner{flex-direction:column;gap:1rem;padding:1.25rem}
  .p-img{width:64px;height:64px}
  .p-photo{width:60px;height:60px}
  .p-body h1{font-size:22px}
  .pills{gap:4px}
  .pill{min-width:60px;padding:.5rem .7rem}
  .pill .pn{font-size:18px}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .tab{white-space:nowrap;flex-shrink:0;padding:8px 14px;font-size:12px}
  table{min-width:480px}
  .tw > div{overflow-x:auto;-webkit-overflow-scrolling:touch}
  th,td{padding:7px 10px;font-size:12px}
  .mobile-nav{display:flex}
  .profile > div:last-child{width:100%;text-align:left!important}
  .profile > div:last-child .pills{justify-content:flex-start!important}
}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="go('/')">
    Allsvenskan<em>AI</em>
    <span class="logo-badge">2026</span>
  </span>
  <nav class="nav-pills">
    <button class="np" onclick="go('/')">Start</button>
    <button class="np" onclick="go('/lag-lista')">Lag</button>
    <button class="np" onclick="go('/tabell')">Tabell</button>
    <button class="np" onclick="go('/resultat')">Resultat</button>
    <button class="np" onclick="go('/overgangar')">Övergångar</button>
    <button class="np" onclick="go('/statistik')">Statistik</button>
    <button class="np" onclick="go('/sok')">AI-sökning</button>
  </nav>
</header>

<main id="mc"><div class="loading"><div class="spinner"></div>Laddar Allsvenskan…</div></main>

<nav class="mobile-nav" id="mobileNav">
  <button class="mnav-btn" onclick="go('/')"><span class="icon">🏠</span>Start</button>
  <button class="mnav-btn" onclick="go('/lag-lista')"><span class="icon">🛡</span>Lag</button>
  <button class="mnav-btn" onclick="go('/tabell')"><span class="icon">🏆</span>Tabell</button>
  <button class="mnav-btn" onclick="go('/resultat')"><span class="icon">📅</span>Resultat</button>
  <button class="mnav-btn" onclick="go('/overgangar')"><span class="icon">🔄</span>Överg.</button>
  <button class="mnav-btn" onclick="go('/statistik')"><span class="icon">⚽</span>Stats</button>
  <button class="mnav-btn" onclick="go('/sok')"><span class="icon">🤖</span>AI</button>
</nav>

<script>

// ─── CONFIG ──────────────────────────────────────────
const LEAGUE = 113;
let SEASON = 2026; // auto-detects current season
const AF = '/api/football';
const C = {chatHistory:[], chatLoading:false};

// Cache
const CACHE = {};

// Name corrections — API-Football 2026 strips Swedish/special chars
const NAME_FIX = {
  'IFK Goteborg': 'IFK Göteborg',
  'Djurgardens IF': 'Djurgårdens IF',
  'Hammarby FF': 'Hammarby IF',
  'Malmo FF': 'Malmö FF',
  'Vasteras SK FK': 'Västerås SK FK',
  'Orgryte IS': 'Örgryte IS',
  'Mjallby AIF': 'Mjällby AIF',
  'IF Elfsborg': 'IF Elfsborg',
  'IF Brommapojkarna': 'IF Brommapojkarna',
  'BK Hacken': 'BK Häcken',
  'Kalmar FF': 'Kalmar FF',
  'Halmstad': 'Halmstads BK',
  'Sirius': 'IK Sirius FK',
  'Degerfors IF': 'Degerfors IF',
  'AIK Stockholm': 'AIK',
  'Gais': 'GAIS',
};
function fixName(s) { return NAME_FIX[s] || s; }
async function af(ep, p={}) {
  const key = ep + JSON.stringify(p);
  if(CACHE[key]) return CACHE[key];
  const q = new URLSearchParams({_endpoint:ep,...p});
  const r = await fetch(`${AF}?${q}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.errors && Object.keys(d.errors).length) throw new Error(Object.values(d.errors).join(', '));
  CACHE[key] = d.response || [];
  return CACHE[key];
}

// Fetch ALL pages of a paginated endpoint
async function afAll(ep, p={}) {
  let page = 1, all = [];
  while(true) {
    const d = await af(ep, {...p, page});
    all = all.concat(d);
    if(d.length < 20) break; // API-Football returns 20/page
    page++;
    if(page > 5) break; // safety
  }
  return all;
}

// ─── ROUTING ─────────────────────────────────────────
function go(path, push=true) {
  if(push) history.pushState({}, '', path);
  updateNav(path);
  // Reset transfers cache only when navigating to a completely different section
  if(transfersCache && !path.startsWith('/overgangar') && !path.startsWith('/spelare')) transfersCache = null;
  route(path);
}
function updateNav(path) {
  document.querySelectorAll('.np').forEach(b => {
    const p = b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    b.classList.toggle('active', p===path||(path==='/'&&p==='/'));
  });
  document.querySelectorAll('.mnav-btn').forEach(b => {
    const p = b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    b.classList.toggle('active', p===path||(path==='/'&&p==='/'));
  });
}
window.addEventListener('popstate', () => route(location.pathname));

function route(path) {
  const el = document.getElementById('mc');
  if(path==='/'||path==='')            { pageStart(el); return; }
  if(path==='/lag-lista')              { pageTeams(el); return; }
  if(path==='/tabell')                 { pageStandings(el); return; }
  if(path==='/resultat')               { pageResults(el); return; }
  if(path==='/overgangar')             { pageTransfers(el, 1); return; }
  const trm = path.match(/^\/overgangar\/(\d+)/);
  if(trm)                              { pageTransfers(el, +trm[1]); return; }
  if(path==='/statistik')              { pageStats(el); return; }
  if(path==='/sok')                    { pageSearch(el); return; }
  const tm = path.match(/^\/lag\/(\d+)/);
  if(tm)                               { pageTeam(el, +tm[1]); return; }
  const pm = path.match(/^\/spelare\/(\d+)/);
  if(pm)                               { pagePlayer(el, +pm[1]); return; }
  el.innerHTML = `<div class="err">Sidan hittades inte.</div>`;
}

// ─── SEARCH ──────────────────────────────────────────
let searchTimer;
function onSearch(v) {
  clearTimeout(searchTimer);
  const box = document.getElementById('sr');
  if(v.trim().length < 3){box.classList.remove('open');return;}
  searchTimer = setTimeout(()=>runSearch(v.trim()), 350);
}
async function runSearch(q) {
  const box = document.getElementById('sr');
  box.innerHTML = `<div style="padding:.75rem 1rem;font-size:13px;color:var(--muted)"><div class="spinner" style="display:inline-block;width:12px;height:12px;margin-right:6px"></div>Söker…</div>`;
  box.classList.add('open');
  try {
    const [players, teams] = await Promise.all([
      af('players', {search:q, season:2025}).catch(()=>af('players', {search:q, season:2024}).catch(()=>[])),
      af('teams', {search:q}).catch(()=>[])
    ]);
    let html = '';
    if(teams.length) {
      html += `<div class="sr-label">Lag</div>`;
      teams.slice(0,3).forEach(t => {
        html += `<div class="sr-item team-item" onclick="go('/lag/${t.team.id}')">
          <img src="${t.team.logo||''}" onerror="this.style.opacity='.2'">
          <div><div class="sr-name">${esc(t.team.name)}</div><div class="sr-sub">Allsvenskan</div></div>
        </div>`;
      });
    }
    if(players.length) {
      html += `<div class="sr-label">Spelare</div>`;
      players.slice(0,6).forEach(p => {
        const s = p.statistics?.[0];
        html += `<div class="sr-item" onclick="go('/spelare/${p.player.id}?team=${p.statistics?.[0]?.team?.id||''}')">
          <img src="${p.player.photo||''}" style="border-radius:50%" onerror="this.style.opacity='.2'">
          <div><div class="sr-name">${esc(p.player.name)}</div>
          <div class="sr-sub">${esc(s?.team?.name||'')} · ${esc(s?.games?.position||'')}</div></div>
        </div>`;
      });
    }
    if(!html) html = `<div style="padding:.75rem 1rem;font-size:13px;color:var(--muted)">Inga resultat för "${q}"</div>`;
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = `<div style="padding:.75rem 1rem;font-size:13px;color:#f08080">Fel: ${esc(e.message)}</div>`;
  }
}
function handleSearchKey(e) {
  if(e.key==='Escape') document.getElementById('sr').classList.remove('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('.search-wrap')) document.getElementById('sr').classList.remove('open');
});

// ─── START PAGE ──────────────────────────────────────
async function pageStart(el) {
  document.title = 'AllsvenskanAI — Allsvenskan statistik, spelare & övergångar';
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Laddar…</div>`;
  try {
    let data = await af('standings', {league:LEAGUE, season:SEASON});
    if(!data.length || !data[0]?.league?.standings?.[0]?.length) {
      data = await af('standings', {league:LEAGUE, season:2025});
    }
    const teams = (data[0]?.league?.standings?.[0]||[]).map(t=>t.team);

    const cards = teams.map(t=>`
      <div class="start-tcard" onclick="go('/lag/${t.id}')">
        <img src="${t.logo||''}" onerror="this.style.opacity='.15'" loading="lazy">
        <div class="start-tn">${esc(t.name)}</div>
      </div>`).join('');

    el.innerHTML = `
      <div class="start-hero">
        <div class="start-hero-inner">
          <div class="start-wordmark">Allsvenskan<span>AI</span></div>
          <div class="start-sub">Statistik · Spelare · Övergångar · Marknadsvärden</div>
        </div>
      </div>

      <div class="start-teams-section">
        <div class="start-section-label">Allsvenskan ${SEASON}</div>
        <div class="start-tgrid">${cards}</div>
      </div>

      <div class="start-ai-section">
        <div class="start-section-label">Fråga Allsvenskan AI</div>
        <div class="chat-wrap">
          <div class="chat-msgs" id="cm" style="min-height:80px">
            <div style="text-align:center;padding:1.5rem;color:var(--muted);font-size:13px">
              Ställ valfri fråga om Allsvenskan…
            </div>
          </div>
          <div class="chips">
            <span class="chip" onclick="askAI('Vem är värd mest i Allsvenskan 2026?')">Marknadsvärden</span>
            <span class="chip" onclick="askAI('Senaste övergångarna i Allsvenskan 2026')">Övergångar</span>
            <span class="chip" onclick="askAI('Skytteligan Allsvenskan 2025')">Skytteliga</span>
            <span class="chip" onclick="askAI('Bästa unga talanger under 21 i Allsvenskan')">U21-talanger</span>
            <span class="chip" onclick="askAI('Senaste nyheterna om Allsvenskan')">Nyheter</span>
          </div>
          <div class="chat-in">
            <textarea id="ci" rows="1" placeholder="Fråga om spelare, lag, statistik…"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
            <button class="send" id="sb" onclick="sendChat()">SKICKA</button>
          </div>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="err">⚠️ ${esc(e.message)}</div>`;
  }
}

// ─── TEAMS ───────────────────────────────────────────
async function pageTeams(el) {
  document.title = 'Alla lag — AllsvenskanAI';
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag…</div>`;
  try {
    let data = await af('standings', {league:LEAGUE, season:SEASON});
    if(!data.length || !data[0]?.league?.standings?.[0]?.length) {
      data = await af('standings', {league:LEAGUE, season:2025});
    }
    const teams = (data[0]?.league?.standings?.[0]||[]).map(t=>t.team);
    const cards = teams.map(t=>`
      <div class="start-tcard" onclick="go('/lag/${t.id}')">
        <img src="${t.logo||''}" onerror="this.style.opacity='.15'" loading="lazy">
        <div class="start-tn">${esc(t.name)}</div>
      </div>`).join('');
    el.innerHTML = `
      <div class="pg-header"><div class="pg-title">Lag <em>${SEASON}</em></div><span class="pg-sub">${teams.length} lag</span></div>
      <div class="start-tgrid">${cards}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="err">⚠️ ${esc(e.message)}</div>`;
  }
}

// ─── TEAM PAGE ───────────────────────────────────────
async function pageTeam(el, teamId) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag…</div>`;
  try {
    // Fetch team stats, current squad, and season stats in parallel
    const [statsD, squadD] = await Promise.all([
      af('teams/statistics', {league:LEAGUE, season:SEASON, team:teamId}),
      af('players/squads', {team:teamId})   // current squad, no season needed
    ]);

    const stats = Array.isArray(statsD) ? statsD[0] : statsD;
    const team = stats?.team || {id:teamId, name:'', logo:''};
    const venue = stats?.venue || {};
    
    // squads endpoint returns [{team, players:[]}]
    const squadPlayers = (squadD[0]?.players || []);
    document.title = `${team.name} — trupp, statistik & övergångar | AllsvenskanAI`;

    const w = stats?.fixtures?.wins?.total||0;
    const d = stats?.fixtures?.draws?.total||0;
    const l = stats?.fixtures?.loses?.total||0;
    const gf = stats?.goals?.for?.total?.total||0;
    const ga = stats?.goals?.against?.total?.total||0;
    const cs = stats?.clean_sheet?.total||0;
    const form = stats?.fixtures?.form||'';
    const formDots = form.slice(-10).split('').map(c=>`<div class="fd ${c==='W'?'fw':c==='D'?'fd-d':'fl'}"></div>`).join('');

    // Sort squad players by position
    const posOrder = {Goalkeeper:1,Defender:2,Midfielder:3,Attacker:4};
    const posLabel = {Goalkeeper:'Målvakter',Defender:'Försvarare',Midfielder:'Mittfältare',Attacker:'Anfallare'};
    const sorted = [...squadPlayers].sort((a,b)=>
      (posOrder[a.position]||5)-(posOrder[b.position]||5));

    let lastPos = '';
    const playerRows = sorted.map(p => {
      const pos = p.position||'—';
      let sep = '';
      if(pos!==lastPos && posLabel[pos]) { lastPos=pos; sep=`<tr class="pos-sep"><td colspan="5">${posLabel[pos]}</td></tr>`; }
      return sep + `<tr class="link" onclick="go('/spelare/${p.id}?team=${teamId}')">
        <td><div class="pcell">
          <img src="${p.photo||''}" onerror="this.style.opacity='.15'" loading="lazy">
          <div><div class="pn">${esc(p.name)}</div>
          <div class="ps">${p.number?'#'+p.number:''}</div></div>
        </div></td>
        <td><span class="pos-tag">${esc(pos)}</span></td>
        <td>${p.age||'—'} år</td>
        <td>${p.nationality ? flag(p.nationality)+' '+esc(p.nationality) : '—'}</td>
        <td style="color:var(--muted);font-size:12px">${p.injured?'🚑 Skadad':''}</td>
      </tr>`;}).join('');

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
        <button class="back" onclick="go('/')">← Alla lag</button>
        <button class="share" onclick="copyLink()">🔗 Kopiera länk</button>
      </div>
      <div class="pg-header"><div class="pg-title">${esc(team.name)}</div></div>

      <div class="profile"><div class="profile-bg"></div><div class="profile-inner">
        <img class="p-img" src="${team.logo||''}" onerror="this.style.opacity='.15'">
        <div class="p-body">
          <div class="p-meta">
            ${venue.name?`<span>🏟 ${esc(venue.name)}</span>`:''}
            ${venue.city?`<span>📍 ${esc(venue.city)}</span>`:''}
            ${venue.capacity?`<span>👥 ${(+venue.capacity).toLocaleString('sv-SE')} platser</span>`:''}
          </div>
          <div class="pills">
            <div class="pill"><div class="pn">${w}</div><div class="pl">Vinster</div></div>
            <div class="pill"><div class="pn">${d}</div><div class="pl">Oavgjorda</div></div>
            <div class="pill"><div class="pn">${l}</div><div class="pl">Förluster</div></div>
            <div class="pill"><div class="pn">${gf}</div><div class="pl">Gjorda mål</div></div>
            <div class="pill"><div class="pn">${ga}</div><div class="pl">Insläppta</div></div>
            <div class="pill"><div class="pn">${cs}</div><div class="pl">Nollor</div></div>
          </div>
          ${form?`<div style="margin-top:.6rem"><div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Form</div><div class="form-row">${formDots}</div></div>`:''}
        </div>
      </div></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'sq')">Spelartrupp (${squadPlayers.length})</button>
        <button class="tab" onclick="switchTab(this,'tai');loadTeamAI('${esc(team.name)}','tai',${teamId})">Övergångar</button>
      </div>

      <div id="sq">
        <div class="tw"><div style="overflow-x:auto"><table>
          <thead><tr>
            <th>Spelare</th><th>Position</th><th>Ålder</th><th>Nationalitet</th><th></th>
          </tr></thead>
          <tbody>${playerRows||'<tr><td colspan="5" class="empty">Inga spelare</td></tr>'}</tbody>
        </table></div></div>
      </div>

      <div id="tai" style="display:none">
        <div class="tw"><div style="padding:1.25rem;color:var(--muted);font-size:13px">Klicka på fliken för att hämta data…</div></div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<button class="back" onclick="go('/')">← Tillbaka</button><div class="err">Fel: ${esc(e.message)}</div>`;
  }
}

async function loadTeamAI(name, tabId, teamId) {
  const el = document.getElementById(tabId);
  if(!el || el.dataset.loaded) return;
  el.dataset.loaded = '1';
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar övergångar…</div>`;
  try {
    const data = await af('transfers', {team: teamId});
    const all = [];
    data.forEach(tr => {
      (tr.transfers||[]).forEach(x => {
        const year = parseInt((x.date||'').slice(0,4));
        if(year >= 2024 && (x.date||'').match(/^\d{4}-\d{2}-\d{2}/)) {
          all.push({
            date: x.date,
            type: x.type,
            playerName: tr.player?.name,
            playerId: tr.player?.id,
            teamIn: x.teams?.in,
            teamOut: x.teams?.out,
          });
        }
      });
    });
    all.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    if(!all.length) {
      el.innerHTML = `<div class="tw"><div class="empty">Inga övergångar hittades</div></div>`;
      return;
    }

    const rows = all.map(tr => {
      const isIn = tr.teamIn?.id == teamId;
      const fc = feeStyle(tr.type);
      return `<tr>
        <td style="font-size:11px;color:var(--muted);white-space:nowrap">${tr.date||'—'}</td>
        <td style="cursor:pointer;color:var(--blue);font-weight:500" onclick="go('/spelare/${tr.playerId}?team=${teamId}')">${esc(tr.playerName||'—')}</td>
        <td>

          <img src="${isIn?(tr.teamOut?.logo||''):(tr.teamIn?.logo||'')}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span style="font-size:12px">${esc(isIn?(tr.teamOut?.name||'?'):(tr.teamIn?.name||'?'))}</span>
        </div></td>

// ─── PLAYER PAGE ─────────────────────────────────────
async function pagePlayer(el, playerId) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar spelardata…</div>`;
  try {
    // Read team context from URL if available (set when clicking from a team page)
    const urlParams = new URLSearchParams(location.search);
    const urlTeamId = urlParams.get('team') ? +urlParams.get('team') : null;

    // Fetch player profile (no season needed) + recent seasons in parallel
    const [profileD, ...seasonResults] = await Promise.all([
      af('players/profiles', {player: playerId}),
      af('players', {id:playerId, season:2026}),
      af('players', {id:playerId, season:2025}),
      af('players', {id:playerId, season:2024}),
    ]);

    const p = profileD[0]?.player;
    if(!p) throw new Error('Spelare hittades inte');
    document.title = `${p.name} — statistik, karriär & övergångar | AllsvenskanAI`;

    // Find best available current stats (most recent season with data)
    // Always show SEASON (2026) stats — use whatever data exists, default to zeros
    // This ensures we show current season even if player hasn't played Allsvenskan yet
    const curSeasonYear = SEASON;
    // Aggregate all stats from current season (may include cup, league etc)
    const cur2026Data = seasonResults[0]; // first result = 2026
    let curStats = {};
    if(cur2026Data.length && cur2026Data[0]?.statistics?.length) {
      // Sum up all competitions in 2026
      const allComps = cur2026Data[0].statistics;
      curStats = {
        games: {
          appearences: allComps.reduce((s,x)=>s+(x.games?.appearences||0),0),
          minutes: allComps.reduce((s,x)=>s+(x.games?.minutes||0),0),
          rating: allComps.find(x=>x.games?.rating)?.games?.rating || null,
          position: allComps[0]?.games?.position || '',
          lineups: allComps.reduce((s,x)=>s+(x.games?.lineups||0),0),
        },
        goals: {
          total: allComps.reduce((s,x)=>s+(x.goals?.total||0),0),
          assists: allComps.reduce((s,x)=>s+(x.goals?.assists||0),0),
        },
        cards: {
          yellow: allComps.reduce((s,x)=>s+(x.cards?.yellow||0),0),
          red: allComps.reduce((s,x)=>s+(x.cards?.red||0),0),
        },
        shots: { total: allComps.reduce((s,x)=>s+(x.shots?.total||0),0), on: allComps.reduce((s,x)=>s+(x.shots?.on||0),0) },
        passes: { total: allComps.reduce((s,x)=>s+(x.passes?.total||0),0), accuracy: allComps[0]?.passes?.accuracy||0 },
        tackles: { total: allComps.reduce((s,x)=>s+(x.tackles?.total||0),0), interceptions: allComps.reduce((s,x)=>s+(x.tackles?.interceptions||0),0) },
        dribbles: { success: allComps.reduce((s,x)=>s+(x.dribbles?.success||0),0) },
        duels: { won: allComps.reduce((s,x)=>s+(x.duels?.won||0),0) },
        team: allComps[0]?.team,
      };
    }
    // If truly no 2026 data at all, curStats stays {} and everything shows 0

    // Prefer team from URL (where user came from) over API data
    let teamId = urlTeamId || curStats.team?.id || profileD[0]?.statistics?.[0]?.team?.id;
    let teamName = curStats.team?.name || '—';
    let teamLogo = curStats.team?.logo || '';

    // If URL teamId differs from stats teamId, fetch correct team info
    if(urlTeamId && urlTeamId !== curStats.team?.id) {
      try {
        const teamD = await af('teams', {id: urlTeamId});
        if(teamD[0]) { teamName = teamD[0].team.name; teamLogo = teamD[0].team.logo; }
      } catch(e) {}
    }

    // Current season numbers
    const curApps    = curStats.games?.appearences||0;
    const curGoals   = curStats.goals?.total||0;
    const curAssists = curStats.goals?.assists||0;
    const curMins    = curStats.games?.minutes||0;
    const curYellow  = curStats.cards?.yellow||0;
    const curRed     = curStats.cards?.red||0;
    const curRating  = curStats.games?.rating ? parseFloat(curStats.games.rating) : null;
    const curRatingClass = curRating ? (curRating>=7.5?'rg':curRating>=6.5?'ry':'rr') : '';

    // Fetch ALL historical seasons in parallel for career stats
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar karriärstatistik…</div>`;

    const seasons = [2026,2025,2024,2023,2022,2021,2020,2019,2018,2017,2016];
    // Reuse already-fetched 2026/2025/2024, fetch rest in parallel
    const remainingSeasons = [2023,2022,2021,2020,2019,2018,2017,2016];
    const remainingData = await Promise.all(
      remainingSeasons.map(s => af('players', {id:playerId, season:s}).catch(()=>[]))
    );
    // Combine: seasonResults = [2026, 2025, 2024], remainingData = [2023..2016]
    const allSeasonData = [...seasonResults, ...remainingData];

    // Build career table
    let careerGoals=0, careerAssists=0, careerApps=0, careerMins=0, careerYellow=0, careerRed=0;
    const seasonRows = [];

    // allSeasonData order: [2026, 2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017, 2016]
    const allSeasonsList = [2026, 2025, 2024, ...remainingSeasons];
    allSeasonData.forEach((data, idx) => {
      const season = allSeasonsList[idx];
      if(!data.length) return;
      data[0].statistics?.forEach(s => {
        if(!s || !s.league) return; // skip empty stats objects
        const g  = s.goals?.total||0;
        const a  = s.goals?.assists||0;
        const m  = s.games?.appearences||0;
        const mn = s.games?.minutes||0;
        const y  = s.cards?.yellow||0;
        const r  = s.cards?.red||0;
        const rt = s.games?.rating ? parseFloat(s.games.rating) : null;
        const rtClass = rt ? (rt>=7.5?'rg':rt>=6.5?'ry':'rr') : '';
        careerGoals   += g;
        careerAssists += a;
        careerApps    += m;
        careerMins    += mn;
        careerYellow  += y;
        careerRed     += r;
        const isCur = season === SEASON;
        seasonRows.push({season, league: s.league?.name||'—', team: s.team?.name||'—', teamLogo: s.team?.logo||'', m, mn, g, a, rt, rtClass, y, r, isCur});
      });
    });

    // Sort by season desc
    seasonRows.sort((a,b) => b.season - a.season || 0);

    const sTableRows = seasonRows.map(s => `
      <tr class="${s.isCur?'season-row':''}" style="${s.isCur?'font-weight:500':''}">
        <td>${s.season}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <img src="${s.teamLogo}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span>${esc(s.team)}</span>
        </div></td>
        <td style="font-size:12px;color:var(--muted)">${esc(s.league)}</td>
        <td class="num">${s.m}</td>
        <td style="color:var(--muted);font-size:12px">${s.mn}</td>
        <td class="num">${s.g||'—'}</td>
        <td class="num">${s.a||'—'}</td>
        <td class="${s.rtClass}" style="font-weight:500">${s.rt?s.rt.toFixed(1):'—'}</td>
        <td style="color:${s.y>4?'var(--gold)':'var(--muted)'}">${s.y||'—'}</td>
        <td style="color:${s.r>0?'var(--red)':'var(--muted)'}">${s.r||'—'}</td>
      </tr>`).join('');

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">
        ${teamId?`<button class="back" onclick="go('/lag/${teamId}')">← ${esc(teamName)}</button>`:`<button class="back" onclick="go('/')">← Hem</button>`}
        <button class="share" onclick="copyLink()">🔗 Kopiera länk</button>
      </div>

      <div class="profile"><div class="profile-bg"></div><div class="profile-inner">
        <img class="p-photo" src="${p.photo||''}" onerror="this.src='';this.style.background='var(--dark4)'">
        <div class="p-body">
          <h1>${esc(p.name)}</h1>
          <div class="p-meta">
            <span>${flag(p.nationality)} ${esc(p.nationality||'—')}</span>
            <span>⚽ ${esc(curStats.games?.position||p.position||'—')}</span>
            ${p.birth?.date?`<span>📅 ${p.birth.date} (${p.age||'?'} år)</span>`:''}
            ${p.height?`<span>📐 ${p.height} / ${p.weight||'—'}</span>`:''}
          </div>
          ${teamId?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:.5rem;cursor:pointer" onclick="go('/lag/${teamId}')">
            <img src="${teamLogo}" style="width:20px;height:20px;object-fit:contain" onerror="this.style.opacity='.15'">
            <span style="color:var(--blue);font-size:13px">${esc(teamName)}</span>
          </div>`:''}
          <span class="season-label">Säsong ${curSeasonYear}</span>
          <div class="pills">
            <div class="pill"><div class="pn">${curApps}</div><div class="pl">Matcher</div></div>
            <div class="pill"><div class="pn">${curMins}</div><div class="pl">Minuter</div></div>
            <div class="pill"><div class="pn">${curGoals}</div><div class="pl">Mål</div></div>
            <div class="pill"><div class="pn">${curAssists}</div><div class="pl">Assist</div></div>
            <div class="pill"><div class="pn ${curRatingClass}">${curRating?curRating.toFixed(1):'—'}</div><div class="pl">Rating</div></div>
          </div>
        </div>
        <div style="text-align:right">
          <span class="season-label">Karriärtotalt</span>
          <div class="pills" style="justify-content:flex-end">
            <div class="pill"><div class="pn">${careerApps}</div><div class="pl">Matcher</div></div>
            <div class="pill"><div class="pn">${careerGoals}</div><div class="pl">Mål</div></div>
            <div class="pill"><div class="pn">${careerAssists}</div><div class="pl">Assist</div></div>
          </div>
          <div style="margin-top:.75rem">
            <button style="background:rgba(232,197,71,.1);border:1px solid var(--border-hi);border-radius:6px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer" onclick="loadMV(this,'${esc(p.name)}')">
              💰 Hämta marknadsvärde
            </button>
            <div id="mv-${playerId}" style="margin-top:.4rem"></div>
          </div>
        </div>
      </div></div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'p-career')">Karriärstatistik (${seasonRows.length} säsonger)</button>
        <button class="tab" onclick="switchTab(this,'p-detail')">Detaljerad ${SEASON}</button>
        <button class="tab" onclick="switchTab(this,'p-tr');loadPlayerTransfers(this,${p.player?.id||playerId},'p-tr')">Övergångar</button>
      </div>

      <div id="p-career">
        <div class="tw"><div style="overflow-x:auto"><table>
          <thead><tr>
            <th>Säsong</th><th>Lag</th><th>Liga</th>
            <th title="Matcher">M</th><th title="Minuter">Min</th>
            <th title="Mål">⚽</th><th title="Assist">🎯</th><th title="Rating">★</th>
            <th title="Gula kort">🟨</th><th title="Röda kort">🟥</th>
          </tr></thead>
          <tbody>
            ${sTableRows||'<tr><td colspan="10" class="empty">Ingen historisk data</td></tr>'}
            <tr class="total-row">
              <td colspan="3" style="color:var(--gold)">Totalt (${seasonRows.length} säsonger)</td>
              <td class="num">${careerApps}</td>
              <td style="color:var(--muted)">${careerMins}</td>
              <td class="num">${careerGoals}</td>
              <td class="num">${careerAssists}</td>
              <td>—</td>
              <td style="color:${careerYellow>10?'var(--gold)':'var(--muted)'}">${careerYellow}</td>
              <td style="color:${careerRed>0?'var(--red)':'var(--muted)'}">${careerRed}</td>
            </tr>
          </tbody>
        </table></div></div>
      </div>

      <div id="p-detail" style="display:none">
        <div class="tw"><table><tbody>
          ${srow('Matcher', curApps)}
          ${srow('Starter', curStats.games?.lineups||0)}
          ${srow('Minuter spelade', curMins)}
          ${srow('Mål', curGoals)}
          ${srow('Assist', curAssists)}
          ${srow('Skott totalt', curStats.shots?.total||0)}
          ${srow('Skott på mål', curStats.shots?.on||0)}
          ${srow('Passningar', curStats.passes?.total||0)}
          ${srow('Passningsprecision', (curStats.passes?.accuracy||0)+'%')}
          ${srow('Tacklingar', curStats.tackles?.total||0)}
          ${srow('Interceptions', curStats.tackles?.interceptions||0)}
          ${srow('Lyckade dribblingar', curStats.dribbles?.success||0)}
          ${srow('Dueller vunna', curStats.duels?.won||0)}
          ${srow('Gula kort', curYellow, curYellow>4?'var(--gold)':'')}
          ${srow('Röda kort', curRed, curRed>0?'var(--red)':'')}
        </tbody></table></div>
      </div>

      <div id="p-tr" style="display:none">
        <div class="tw"><div style="padding:1rem;color:var(--muted);font-size:13px">Klicka på fliken för att ladda…</div></div>
      </div>`;

  } catch(e) {
    el.innerHTML = `<button class="back" onclick="go('/')">← Hem</button><div class="err">Fel: ${esc(e.message)}</div>`;
  }
}

function srow(label, val, col) {
  return `<tr><td style="color:var(--muted);padding:7px 12px;width:55%">${label}</td>
    <td style="padding:7px 12px;font-weight:500${col?';color:'+col:''}">${val}</td></tr>`;
}

async function loadMV(btn, name) {
  const id = btn.parentElement.querySelector('[id^="mv-"]').id;
  const el = document.getElementById(id);
  btn.disabled = true;
  btn.textContent = '⏳ Hämtar…';
  try {
    const resp = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({system: AISYS, messages:[{role:'user', content:
        `Sök på transfermarkt.com och hitta marknadsvärdet för fotbollsspelaren ${name}. Ge: aktuellt marknadsvärde, kontraktets slutdatum och klubb. Max 2 meningar på svenska.`}]})});
    const d = await resp.json();
    const text = (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    el.innerHTML = `<div style="font-size:12px;line-height:1.6;background:var(--dark3);border-radius:5px;padding:7px 10px;border:1px solid var(--border)">${mdHtml(text)}</div>`;
    btn.style.display='none';
  } catch(e) {
    el.innerHTML = `<div style="font-size:11px;color:#f08080">Fel: ${esc(e.message)}</div>`;
    btn.textContent = '💰 Hämta marknadsvärde';
    btn.disabled = false;
  }
}

async function loadPlayerTransfers(tab, playerId, tabId) {
  const el = document.getElementById(tabId);
  if(!el || el.dataset.loaded) return;
  el.dataset.loaded = '1';
  el.innerHTML = `<div class="tw"><div style="padding:1rem;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px"><div class="spinner" style="width:14px;height:14px"></div> Hämtar övergångar…</div></div>`;
  try {
    const data = await af('transfers', {player: playerId});
    if(!data.length) {
      el.innerHTML = `<div class="tw"><div class="empty">Inga övergångar hittades</div></div>`;
      return;
    }
    const transfers = [];
    data.forEach(tr => (tr.transfers||[]).forEach(x => transfers.push({
      date: x.date, type: x.type, teamIn: x.teams?.in, teamOut: x.teams?.out,
    })));
    transfers.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const rows = transfers.map(tr => {
      const fc = feeStyle(tr.type);
      return `<tr>
        <td style="font-size:11px;color:var(--muted);white-space:nowrap">${tr.date||'—'}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <img src="${tr.teamOut?.logo||''}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span style="font-size:12px;color:var(--muted)">${esc(tr.teamOut?.name||'?')}</span>
          <span style="color:var(--muted)">→</span>
          <img src="${tr.teamIn?.logo||''}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span style="font-size:12px">${esc(tr.teamIn?.name||'?')}</span>
        </div></td>
        <td><span style="font-size:10px;padding:2px 8px;border-radius:10px;${fc}">${esc(tr.type||'?')}</span></td>
      </tr>`;}).join('');
    el.innerHTML = `<div class="tw"><div style="overflow-x:auto"><table>
      <thead><tr><th>Datum</th><th>Övergång</th><th>Typ</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
  } catch(e) {
    el.innerHTML = `<div class="err">Fel: ${esc(e.message)}</div>`;
  }
}

// ─── TRANSFERS ───────────────────────────────────────
let transfersCache = null;

async function pageTransfers(el, page=1) {
  document.title = 'Övergångar — AllsvenskanAI';
  const PER_PAGE = 50;

  if(!transfersCache) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag...</div>`;
    try {
      const standData = await af('standings', {league:LEAGUE, season:SEASON});
      const teams = standData[0]?.league?.standings?.[0]?.map(t=>t.team)||[];
      el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar övergångar för ${teams.length} lag...</div>`;
      const all = [];
      await Promise.all(teams.map(async t => {
        try {
          const d = await af('transfers', {team:t.id});
          d.forEach(tr => {
            (tr.transfers||[]).forEach(x => {
              const year = parseInt((x.date||'').slice(0,4));
              const validDate = /^[0-9]{4}-[0-9]{2}-[0-9]{2}/.test(x.date||'');
              if(year >= 2024 && validDate) {
                const type = x.type || '';
                const teamIn = x.teams?.in;
                const teamOut = x.teams?.out;
                const isInternal = type === 'Raise' || type === 'Loan Return' ||
                  (teamIn?.id && teamOut?.id && teamIn.id === teamOut.id);
                // For Raise: use the current team (t) since API doesn't provide team info
                const resolvedTeam = teamIn || teamOut || t;
                // Skip unknown type "-" entries with no team info
                if(type === '-' && !teamIn && !teamOut) return;
                all.push({
                  date: x.date,
                  type: isInternal ? 'Uppflyttad' : (type === '-' ? 'Okänd' : type),
                  playerName: tr.player?.name, playerId: tr.player?.id,
                  teamIn: isInternal ? resolvedTeam : (teamIn || null),
                  teamOut: isInternal ? resolvedTeam : (teamOut || null),
                  isInternal,
                });
              }
            });
          });
        } catch(e) {}
      }));
      const seen = new Set();
      transfersCache = all.filter(t => {
        const key = t.playerId+'-'+t.date+'-'+(t.teamIn?.id||'');
        if(seen.has(key)) return false;
        seen.add(key); return true;
      }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    } catch(e) {
      el.innerHTML = `<div class="err">Fel: ${esc(e.message)}</div>`;
      return;
    }
  }

  const unique = transfersCache;
  const totalPages = Math.ceil(unique.length / PER_PAGE);
  const slice = unique.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const rows = slice.map(tr => {
    const fc = feeStyle(tr.type);
    return `<tr>
      <td style="font-size:11px;color:var(--muted);white-space:nowrap">${tr.date||'—'}</td>
      <td style="font-weight:500;color:var(--blue);cursor:pointer" onclick="go('/spelare/${tr.playerId}?team=${tr.teamIn?.id||''}')">${esc(tr.playerName||'—')}</td>
      <td><div style="display:flex;align-items:center;gap:5px">
        <img src="${tr.teamOut?.logo||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
        <span style="font-size:12px">${esc(tr.teamOut?.name||'?')}</span>
      </div></td>
      <td style="color:var(--muted)">→</td>
      <td>${tr.teamIn?.id && tr.teamIn.id !== tr.teamOut?.id ? `<div style="display:flex;align-items:center;gap:5px">
        <img src="${tr.teamIn.logo||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
        <span style="font-size:12px">${esc(tr.teamIn.name||'?')}</span>
      </div>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td><span style="font-size:10px;padding:2px 8px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-weight:700;${fc}">${esc(tr.type||'?')}</span></td>
    </tr>`;
  }).join('');

  const pageBtns = [];
  if(page > 1) pageBtns.push(`<button class="page-btn" onclick="go('/overgangar/${page-1}')">← Föregående</button>`);
  const s = Math.max(1,page-2), e2 = Math.min(totalPages,page+2);
  for(let i=s;i<=e2;i++) pageBtns.push(`<button class="page-btn ${i===page?'active':''}" onclick="go('/overgangar/${i}')">${i}</button>`);
  if(page < totalPages) pageBtns.push(`<button class="page-btn" onclick="go('/overgangar/${page+1}')">Nästa →</button>`);

  el.innerHTML = `
    <div class="pg-header"><div class="pg-title">Övergångar</div><span class="pg-sub">${unique.length} övergångar · sida ${page} av ${totalPages}</span></div>
    <div class="tw"><div style="overflow-x:auto"><table>
      <thead><tr><th>Datum</th><th>Spelare</th><th>Från</th><th></th><th>Till</th><th>Typ</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Inga övergångar</td></tr>'}</tbody>
    </table></div></div>
    <div class="pagination">${pageBtns.join('')}</div>`;
  window.scrollTo(0,0);
}

let statsCache = null;

let statsYear = 2025; // default to last completed season

async function pageStats(el, year=null) {
  if(year) statsYear = year;
  document.title = `Statistik ${statsYear} — AllsvenskanAI`;
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar statistik ${statsYear}…</div>`;
  try {
    statsCache = null;
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar spelare för ${statsYear}…</div>`;

    // Get teams from standings for that year
    const standData = await af('standings', {league:LEAGUE, season:statsYear});
    const teams = (standData[0]?.league?.standings?.[0]||[]).map(t=>t.team);

    if(!teams.length) throw new Error(`Inga lag hittades för säsong ${statsYear}. API-Football kanske saknar denna säsong.`);

    el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar statistik för ${teams.length} lag…</div>`;

    // Fetch ALL players per team (all pages)
    const allPlayers = [];
    const chunks = [];
    for(let i=0; i<teams.length; i+=3) chunks.push(teams.slice(i,i+3));
    for(const chunk of chunks) {
      await Promise.all(chunk.map(async t => {
        let page = 1;
        while(true) {
          const r = await af('players', {league:LEAGUE, season:statsYear, team:t.id, page}).catch(()=>[]);
          const arr = Array.isArray(r) ? r : [];
          allPlayers.push(...arr);
          if(arr.length < 20) break; // no more pages
          page++;
          if(page > 5) break; // safety
        }
      }));
    }

    if(!allPlayers.length) throw new Error(`Ingen spelardata för ${statsYear}`);
    statsCache = allPlayers;
    renderStats(el, 'goals');
  } catch(e) { el.innerHTML=`<div class="err">⚠️ ${esc(e.message)}</div>`; }
}

        <div class="ps">${flag(x.p.nationality)} ${esc(x.p.nationality||'')}</div></div>
      </div></td>
      <td><div style="display:flex;align-items:center;gap:5px">
        <img src="${x.s.team?.logo||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
        <span style="font-size:12px;cursor:pointer;color:var(--blue)" onclick="event.stopPropagation();go('/lag/${x.s.team?.id}')">${esc(fixName(x.s.team?.name||'—'))}</span>

      <td class="num ${cat.id==='rating'?rc:''}" style="font-size:22px">${displayVal}</td>
      ${cat.id!=='goals'?`<td class="num" style="font-size:15px;color:var(--muted)">${x.s.goals?.total||0} mål</td>`:''}
      <td style="font-size:12px;color:var(--muted)">${x.s.games?.appearences||0} M</td>
    </tr>`;

  const extraCol = cat.id!=='goals' ? `<th>Mål</th>` : '';

  ).join('');

  el.innerHTML = `
    <div class="pg-header"><div class="pg-title">Statistik <em>${statsYear}</em></div></div>
    <div style="margin-bottom:.75rem">
      <div class="section-label">Säsong</div>

const STAT_KEYS = {
  'mål':'goals.total','goal':'goals.total','scorer':'goals.total',
  'assist':'goals.assists','assists':'goals.assists',
  'passning':'passes.total','passningar':'passes.total','passes':'passes.total',
  'skott':'shots.total','shots':'shots.total',
  'tackling':'tackles.total','tacklingar':'tackles.total',

  'gult':'cards.yellow','gula':'cards.yellow','gula kort':'cards.yellow',
  'rött':'cards.red','röda':'cards.red','röda kort':'cards.red',
  'interception':'tackles.interceptions','interceptions':'tackles.interceptions',
  'dribbling':'dribbles.success','dribblingar':'dribbles.success',
};

function getNestedVal(obj, path) {
  return path.split('.').reduce((o,k) => o?.[k], obj) || 0;
}

// Try to resolve a question using live API-Football data
async function tryDataAnswer(question) {
  const q = question.toLowerCase();

  // Find which team is mentioned
  const standData = await af('standings', {league:LEAGUE, season:SEASON}).catch(()=>
    af('standings', {league:LEAGUE, season:2025}));
  const teams = standData[0]?.league?.standings?.[0]?.map(t=>t.team) || [];

  let matchedTeam = null;
  for(const t of teams) {
    const name = fixName(t.name).toLowerCase();
    const parts = name.split(/\s+/);
    if(parts.some(p => p.length > 3 && q.includes(p)) || q.includes(name)) {
      matchedTeam = t;
      break;
    }
  }

  // Find which stat is asked about
  let matchedStat = null, matchedStatLabel = null;
  for(const [word, path] of Object.entries(STAT_KEYS)) {
    if(q.includes(word)) { matchedStat = path; matchedStatLabel = word; break; }
  }

  // If both team and stat found → fetch player data and answer directly
  if(matchedTeam && matchedStat) {
    const players = await afAll('players', {league:LEAGUE, season:2025, team:matchedTeam.id});
    if(!players.length) return null;

    const sorted = players
      .map(p => ({
        name: p.player.name,
        photo: p.player.photo,
        id: p.player.id,
        val: getNestedVal(p.statistics?.[0] || {}, matchedStat)
      }))
      .filter(p => p.val > 0)
      .sort((a,b) => b.val - a.val);

    if(!sorted.length) return null;

    const isMin = q.includes('minst') || q.includes('lägst') || q.includes('färst');
    const list = isMin ? sorted.reverse() : sorted;
    const top = list.slice(0, 5);

    const rows = top.map((p,i) => `
      <tr class="link" onclick="go('/spelare/${p.id}?team=${matchedTeam.id}')">
        <td style="color:var(--muted);font-weight:700;font-family:'Barlow Condensed',sans-serif">${i+1}</td>
        <td><div class="pcell">
          <img src="${p.photo||''}" onerror="this.style.opacity='.15'">
          <span class="pn">${esc(p.name)}</span>
        </div></td>
        <td class="num" style="font-size:20px">${p.val}</td>
      </tr>`).join('');

    const label = matchedStatLabel.charAt(0).toUpperCase() + matchedStatLabel.slice(1);
    return `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">
        <img src="${matchedTeam.logo}" style="width:24px;height:24px;object-fit:contain">
        <strong style="font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:1px;text-transform:uppercase">${esc(fixName(matchedTeam.name))}</strong>
        <span style="color:var(--muted);font-size:13px">— ${label} (säsong 2025)</span>
      </div>
      <div class="tw"><table>
        <thead><tr><th>#</th><th>Spelare</th><th>${label}</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div style="font-size:11px;color:var(--muted);margin-top:.5rem">Klicka på en spelare för att se full profil</div>`;
  }

  // Standings question
  if(q.includes('tabell') || q.includes('leder') || q.includes('etta') || q.includes('toppar')) {
    const rows = teams.slice(0,16).map((t,i) => `
      <tr class="link" onclick="go('/lag/${t.id}')">
        <td style="color:var(--muted);font-weight:700">${i+1}</td>
        <td><div style="display:flex;align-items:center;gap:7px">
          <img src="${t.logo}" style="width:18px;height:18px;object-fit:contain">
          <span style="font-weight:500">${esc(fixName(t.name))}</span>
        </div></td>
        <td class="num">${standData[0]?.league?.standings?.[0]?.[i]?.points || ''}</td>
      </tr>`).join('');
    return `<div class="tw"><table>
      <thead><tr><th>#</th><th>Lag</th><th>Poäng</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  return null; // Can't answer from data alone
}

function askAI(q){const i=document.getElementById('ci');if(i){i.value=q;sendChat();}}

async function sendChat() {
  const inp=document.getElementById('ci'), msgs=document.getElementById('cm'), btn=document.getElementById('sb');
  if(!inp||C.chatLoading)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  C.chatLoading=true;if(btn)btn.disabled=true;
  const w=msgs?.querySelector('div[style*="text-align:center"]');if(w)w.remove();
  C.chatHistory.push({role:'user',text});
  msgs.innerHTML+=`<div class="mu"><div class="mrole">Du</div><div class="mb">${esc(text)}</div></div>`;
  const aid='a'+Date.now();
  msgs.innerHTML+=`<div class="ma" id="${aid}"><div class="mrole">AI</div><div class="mb"><div class="dots"><span></span><span></span><span></span></div> <span style="font-size:11px;color:var(--muted)">Hämtar data…</span></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    // First try to answer from live API data (fast)
    const dataAnswer = await tryDataAnswer(text);
    if(dataAnswer) {
      C.chatHistory.push({role:'assistant', text:'[data]', html:dataAnswer});
      const ae=document.getElementById(aid);
      if(ae)ae.outerHTML=`<div class="ma"><div class="mrole">AI <span style="font-size:9px;color:var(--green);letter-spacing:1px">● LIVE DATA</span></div><div class="mb">${dataAnswer}</div></div>`;
    } else {
      // Fall back to web search for complex questions
      const ae2=document.getElementById(aid);
      if(ae2)ae2.querySelector('.mb').innerHTML=`<div class="dots"><span></span><span></span><span></span></div> <span style="font-size:11px;color:var(--muted)">Söker på webben…</span>`;
      const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system:AISYS,messages:C.chatHistory.filter(m=>m.text!=='[data]').map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='assistant'?(m.raw||m.text):m.text}))})});
      const d=await resp.json();
      if(d.error)throw new Error(d.error.message);
      const raw=d.content||[];
      const ansText=raw.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'Inget svar.';
      C.chatHistory.push({role:'assistant',text:ansText,raw});
      const ae=document.getElementById(aid);
      if(ae)ae.outerHTML=`<div class="ma"><div class="mrole">AI <span style="font-size:9px;color:var(--blue);letter-spacing:1px">● WEBB</span></div><div class="mb ai-content">${mdHtml(ansText)}</div></div>`;
    }
  }catch(e){
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="ma"><div class="mrole">AI</div><div class="mb" style="color:#f08080">Fel: ${esc(e.message)}</div></div>`;
    C.chatHistory.pop();
  }
  C.chatLoading=false;if(btn)btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function copyLink(){navigator.clipboard.writeText(location.href).then(()=>{const b=event.target;const o=b.textContent;b.textContent='✅';setTimeout(()=>b.textContent=o,2000);});}
function fixEnc(s) {
  if(!s) return '';
  try {
    return decodeURIComponent(escape(s));
  } catch(e) {
    return s
      .replace(/Ã¶/g,'ö').replace(/Ã¤/g,'ä').replace(/Ã¥/g,'å')
      .replace(/Ã–/g,'Ö').replace(/Ã„/g,'Ä').replace(/Ã…/g,'Å')
      .replace(/Ä/g,'č').replace(/Ä/g,'ć').replace(/Å¡/g,'š')
      .replace(/Å¾/g,'ž').replace(/Ä/g,'đ');
  }
}
function esc(s){
  return fixEnc(fixName(String(s||'')))
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function calcAge(d){const b=new Date(d),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function formatVal(v){if(!v)return'—';const n=+v;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return n;}
function feeStyle(t){const s=(t||'').toLowerCase();if(s.includes('loan'))return'background:rgba(61,126,191,.15);color:#7EB3E8';if(s==='free'||s.includes('free'))return'background:rgba(58,158,106,.15);color:#5DC492';return'background:rgba(212,175,55,.15);color:var(--gold)';}
const FLAGS={Sweden:'🇸🇪',Nigeria:'🇳🇬',Ghana:'🇬🇭',Finland:'🇫🇮',Norway:'🇳🇴',Denmark:'🇩🇰',Brazil:'🇧🇷',Argentina:'🇦🇷',England:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',Scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',France:'🇫🇷',Spain:'🇪🇸',Portugal:'🇵🇹',Germany:'🇩🇪',Italy:'🇮🇹',Netherlands:'🇳🇱',Poland:'🇵🇱',Serbia:'🇷🇸',Croatia:'🇭🇷',Kosovo:'🇽🇰',Albania:'🇦🇱',Iceland:'🇮🇸',Ireland:'🇮🇪',USA:'🇺🇸',Senegal:'🇸🇳',Morocco:'🇲🇦',Cameroon:'🇨🇲',Tunisia:'🇹🇳',Mali:'🇲🇱','Ivory Coast':'🇨🇮',Peru:'🇵🇪',Romania:'🇷🇴',Bosnia:'🇧🇦',Slovakia:'🇸🇰',Hungary:'🇭🇺',Greece:'🇬🇷',Turkey:'🇹🇷',Ukraine:'🇺🇦',Austria:'🇦🇹',Switzerland:'🇨🇭',Belgium:'🇧🇪',Colombia:'🇨🇴',Chile:'🇨🇱',Mexico:'🇲🇽',Jamaica:'🇯🇲'};
function flag(n){return FLAGS[n]||'🌍';}
function mdHtml(txt){
  const lines=txt.split('\n');let out='',inT=false;
  for(const line of lines){
    if(/^\|/.test(line)&&/\|$/.test(line.trim())){
      if(!inT){out+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;margin:8px 0">';inT=true;}
      if(/^[\|\s:-]+$/.test(line.replace(/\|/g,'')))continue;
      const cs=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      out+='<tr>'+cs.map(c=>`<td style="padding:5px 10px;border:1px solid var(--border);font-size:12px">${inl(c.trim())}</td>`).join('')+'</tr>';
    }else{
      if(inT){out+='</table></div>';inT=false;}
      if(/^### /.test(line))out+=`<strong style="font-size:13px;color:var(--gold);display:block;margin:6px 0 2px">${inl(line.slice(4))}</strong>`;
      else if(/^## /.test(line))out+=`<strong style="font-size:14px;color:var(--gold);display:block;margin:8px 0 3px">${inl(line.slice(3))}</strong>`;
      else if(/^# /.test(line))out+=`<strong style="font-size:15px;color:var(--gold);display:block;margin:10px 0 4px">${inl(line.slice(2))}</strong>`;
      else if(/^[-*] /.test(line))out+=`<div style="display:flex;gap:5px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span>${inl(line.slice(2))}</div>`;
      else if(line.trim()==='')out+='<br>';
      else out+=inl(line)+'<br>';
    }
  }
  if(inT)out+='</table></div>';
  return out;
}
function inl(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}

async function boot() {
  // Try current year first, fall back to previous if no team data
  try {
    const test = await af('teams', {league:LEAGUE, season:SEASON});
    if(!test || test.length === 0) {
      SEASON = 2025;
    }
  } catch(e) {
    SEASON = 2025;
  }
  route(location.pathname);
}
boot();
