<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allsvenskan Statistik</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8C547;--gold-dim:#b89a25;
  --dark:#0D0F14;--dark2:#161921;--dark3:#1E2230;--dark4:#252a3a;
  --border:rgba(232,197,71,0.12);--border-hi:rgba(232,197,71,0.38);
  --text:#E8EAF0;--muted:#6A7090;
  --red:#E24B4A;--green:#4CAF50;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1.2rem;height:60px;position:sticky;top:0;z-index:200}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);white-space:nowrap;flex-shrink:0}
.logo em{color:var(--text);opacity:.4;font-style:normal}
.season-badge{font-size:11px;font-weight:500;background:rgba(232,197,71,.12);color:var(--gold);border:1px solid var(--border-hi);border-radius:20px;padding:3px 10px;letter-spacing:.5px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#globalSearch{background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;outline:none;width:220px;transition:border-color .2s}
#globalSearch:focus{border-color:var(--border-hi)}
#globalSearch::placeholder{color:var(--muted)}
.layout{display:flex;flex:1;min-height:0}
nav{width:210px;min-width:210px;background:var(--dark2);border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto;display:flex;flex-direction:column}
.nav-section{padding:.6rem 1rem .2rem;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.nav-btn:hover{background:var(--dark3)}
.nav-btn.active{background:var(--dark3);color:var(--gold);border-left-color:var(--gold)}
.nav-icon{width:18px;text-align:center;flex-shrink:0;font-size:14px}
main{flex:1;overflow-y:auto;padding:1.75rem 2rem}
.page-title{display:flex;align-items:baseline;gap:12px;margin-bottom:1.25rem}
.page-title h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;color:var(--gold);line-height:1}
.page-title span{font-size:13px;color:var(--muted)}
.info-banner{background:rgba(74,158,255,.07);border:1px solid rgba(74,158,255,.2);color:#8bb8ff;border-radius:8px;padding:.75rem 1rem;font-size:12px;line-height:1.6;margin-bottom:1.25rem}
.table-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-toolbar h3{font-size:14px;font-weight:500;margin-right:auto}
.filter-select{background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;cursor:pointer}
.search-input{background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;outline:none;width:160px}
.search-input::placeholder{color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text)}
th.sorted{color:var(--gold)}
td{font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.td-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:.5px}
.td-pos{font-size:11px;background:var(--dark3);border-radius:4px;padding:2px 6px;color:var(--muted)}
.badge-team{display:inline-flex;align-items:center;gap:6px}
.badge-team img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.team-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:border-color .2s,background .2s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.team-card:hover{border-color:var(--border-hi);background:var(--dark3)}
.team-card img{width:60px;height:60px;object-fit:contain}
.team-card .name{font-size:13px;font-weight:500;line-height:1.3}
.team-card .sub{font-size:11px;color:var(--muted)}
.player-header{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap}
.player-thumb{width:80px;height:80px;border-radius:50%;background:var(--dark3);border:2px solid var(--border);object-fit:cover;flex-shrink:0}
.player-info h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--gold)}
.player-meta{font-size:12px;color:var(--muted);margin:.25rem 0 .75rem;display:flex;flex-wrap:wrap;gap:0 12px}
.stat-pills{display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{background:var(--dark3);border-radius:7px;padding:.55rem .85rem;text-align:center}
.stat-pill .n{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)}
.stat-pill .l{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.chat-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chat-head{background:var(--dark3);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-msgs{padding:1.25rem;min-height:240px;max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.msg-user,.msg-ai{display:flex;flex-direction:column;gap:4px}
.msg-role{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.msg-ai .msg-role{color:var(--gold-dim)}
.msg-bubble{background:var(--dark3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.msg-user .msg-bubble{background:var(--dark4);border-color:var(--border-hi)}
.dots{display:flex;gap:4px;padding:2px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.7;animation:bns 1.1s infinite}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bns{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-6px);opacity:1}}
.chat-input-row{border-top:1px solid var(--border);padding:.9rem 1.25rem;display:flex;gap:8px}
.chat-input-row textarea{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;min-height:38px;max-height:110px;line-height:1.5;transition:border-color .2s}
.chat-input-row textarea:focus{border-color:var(--border-hi)}
.chat-input-row textarea::placeholder{color:var(--muted)}
.send-btn{background:var(--gold);color:var(--dark);border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:9px 18px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.35;cursor:not-allowed}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 1.25rem;border-top:1px solid var(--border)}
.chip{background:var(--dark3);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;padding:4px 11px;cursor:pointer;transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--border-hi);color:var(--text)}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--muted);font-size:14px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:1rem;display:flex;align-items:center;gap:5px;padding:0}
.back-btn:hover{color:var(--text)}
@media(max-width:768px){nav{display:none}main{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">Allsvenskan <em>/</em> Stats</div>
  <div class="season-badge">2026</div>
  <div class="header-right">
    <input id="globalSearch" type="text" placeholder="Sök via AI…" onkeydown="if(event.key==='Enter')doGlobalSearch(this.value)">
  </div>
</header>
<div class="layout">
  <nav id="sidebar">
    <div class="nav-section">Spelartrupp</div>
    <button class="nav-btn active" onclick="showPage('players',this)"><span class="nav-icon">👥</span>Alla spelare</button>
    <button class="nav-btn" onclick="showPage('compare',this)"><span class="nav-icon">⚖️</span>Jämför spelare</button>
    <div class="nav-section">Ligadata</div>
    <button class="nav-btn" onclick="showPage('standings',this)"><span class="nav-icon">🏆</span>Tabell</button>
    <button class="nav-btn" onclick="showPage('results',this)"><span class="nav-icon">📅</span>Resultat</button>
    <button class="nav-btn" onclick="showPage('teams',this)"><span class="nav-icon">🛡</span>Lag</button>
    <div class="nav-section">Sökning</div>
    <button class="nav-btn" onclick="showPage('search',this)"><span class="nav-icon">🔍</span>AI-statistiksökning</button>
  </nav>
  <main id="mainContent">
    <div class="loading"><div class="spinner"></div> Hämtar Allsvenskan-data från TheSportsDB…</div>
  </main>
</div>
<script>
const TSDB = 'https://www.thesportsdb.com/api/v1/json/123';
const LEAGUE_ID = '4347';
const SEASON = '2025-2026';

const S = {
  teams: [], players: {}, events: [], page: 'players',
  filterTeam: '', filterPos: '', tableSearch: '',
  chatHistory: [], chatLoading: false,
  cmpA: null, cmpB: null,
  sortKey: 'strPlayer', sortDir: 1,
};

async function apiFetch(ep) {
  const r = await fetch(TSDB + ep);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

/* ── BOOT ── */
async function boot() {
  try {
    const td = await apiFetch('/search_all_teams.php?l=Swedish+Allsvenskan');
    S.teams = (td.teams || []).sort((a,b)=>a.strTeam.localeCompare(b.strTeam,'sv'));
    await loadAllPlayers();
    await loadEvents();
    showPage('players', document.querySelector('.nav-btn.active'));
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div style="background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.3);border-radius:8px;padding:1rem;color:#f08080;font-size:13px">
        ⚠️ Kunde inte hämta data: ${esc(e.message)}.<br>
        Se till att du öppnar filen direkt i en webbläsare (CORS). TheSportsDB API är gratis och kräver ingen API-nyckel.
      </div>`;
  }
}

async function loadAllPlayers() {
  const chunks = [];
  for (let i=0; i<S.teams.length; i+=4) chunks.push(S.teams.slice(i,i+4));
  for (const chunk of chunks) {
    await Promise.all(chunk.map(async t => {
      try {
        const d = await apiFetch('/lookup_all_players.php?id=' + t.idTeam);
        S.players[t.idTeam] = (d.player||[])
          .filter(p => p.strSport==='Soccer')
          .map(p => ({...p, _team: t.strTeam, _badge: t.strTeamBadge, _teamId: t.idTeam}));
      } catch { S.players[t.idTeam]=[]; }
    }));
  }
}

async function loadEvents() {
  try {
    const d = await apiFetch('/eventspastleague.php?id='+LEAGUE_ID);
    S.events = d.events || [];
  } catch { S.events=[]; }
}

function allP() { return Object.values(S.players).flat(); }

/* ── NAVIGATION ── */
function showPage(page, btn) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  S.page = page; render();
}

function render() {
  const el = document.getElementById('mainContent');
  switch(S.page) {
    case 'players':   el.innerHTML = renderPlayers(); break;
    case 'standings': el.innerHTML = renderStandings(); break;
    case 'results':   el.innerHTML = renderResults(); break;
    case 'teams':     el.innerHTML = renderTeams(); break;
    case 'search':    el.innerHTML = renderSearch(); scrollChat(); break;
    case 'compare':   el.innerHTML = renderCompare(); break;
  }
}

/* ── PLAYERS ── */
function renderPlayers() {
  let players = allP();
  if (S.filterTeam) players = players.filter(p=>p._teamId===S.filterTeam);
  if (S.filterPos) players = players.filter(p=>(p.strPosition||'').toLowerCase().includes(S.filterPos.toLowerCase()));
  if (S.tableSearch) players = players.filter(p=>(p.strPlayer||'').toLowerCase().includes(S.tableSearch.toLowerCase()));
  players = [...players].sort((a,b)=>{
    const va = a[S.sortKey]||'', vb = b[S.sortKey]||'';
    return S.sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });

  const teamOpts = S.teams.map(t=>`<option value="${t.idTeam}" ${S.filterTeam===t.idTeam?'selected':''}>${esc(t.strTeam)}</option>`).join('');
  const posOpts = ['Goalkeeper','Defender','Midfielder','Forward'].map(p=>`<option value="${p}" ${S.filterPos===p?'selected':''}>${p}</option>`).join('');

  const rows = players.map((p,i)=>`
    <tr style="cursor:pointer" onclick="openPlayer('${p.idPlayer}')">
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:7px">
          <img src="${p.strThumb||p.strCutout||p._badge||''}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--dark4)" onerror="this.style.display='none'" loading="lazy">
          <div>
            <div style="font-weight:500">${esc(p.strPlayer)}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(p._team)}</div>
          </div>
        </div>
      </td>
      <td><span class="td-pos">${esc(p.strPosition||'—')}</span></td>
      <td>${p.dateBorn ? age(p.dateBorn)+' år' : '—'}</td>
      <td style="font-size:12px">${flag(p.strNationality)} ${esc(p.strNationality||'—')}</td>
      <td style="font-size:12px;color:var(--muted)">${p.strHeight||'—'}</td>
    </tr>`).join('');

  const thS = (key, label) => `<th class="${S.sortKey===key?'sorted':''}" onclick="sortTable('${key}')">${label}${S.sortKey===key?(S.sortDir>0?' ↑':' ↓'):''}</th>`;

  return `
    <div class="page-title"><h1>Spelare</h1><span>${players.length} av ${allP().length} spelare</span></div>
    <div class="info-banner">
      ℹ️ Spelardata (namn, position, nationalitet, ålder) hämtas live från <strong>TheSportsDB</strong> (gratis API) — uppdateras löpande. 
      För säsongsstatistik (mål, assist, rating) — använd <strong>AI-sökning</strong> i menyn.
    </div>
    <div class="table-wrap">
      <div class="table-toolbar">
        <h3>Spelarkatalog — Allsvenskan 2026</h3>
        <select class="filter-select" onchange="S.filterTeam=this.value;render()">
          <option value="">Alla lag</option>${teamOpts}
        </select>
        <select class="filter-select" onchange="S.filterPos=this.value;render()">
          <option value="">Alla positioner</option>${posOpts}
        </select>
        <input class="search-input" type="text" placeholder="Sök spelare…" value="${esc(S.tableSearch)}" oninput="S.tableSearch=this.value;render()">
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>#</th>
          ${thS('strPlayer','Spelare')}
          ${thS('strPosition','Position')}
          ${thS('dateBorn','Ålder')}
          ${thS('strNationality','Nationalitet')}
          <th>Längd</th>
        </tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Inga spelare hittades</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function sortTable(key) {
  if (S.sortKey===key) S.sortDir *= -1;
  else { S.sortKey=key; S.sortDir=1; }
  render();
}

async function openPlayer(id) {
  const all = allP();
  const p = all.find(x=>x.idPlayer===id);
  if (!p) return;
  const el = document.getElementById('mainContent');
  el.innerHTML = `<button class="back-btn" onclick="showPage('players',null)">← Tillbaka till spelare</button>
    <div class="loading"><div class="spinner"></div> Hämtar spelarinfo…</div>`;
  try {
    const d = await apiFetch('/lookupplayer.php?id='+id);
    const full = d.players?.[0] || p;
    el.innerHTML = `
      <button class="back-btn" onclick="showPage('players',null)">← Tillbaka till spelare</button>
      <div class="player-header">
        <img class="player-thumb" src="${full.strThumb||full.strCutout||''}" onerror="this.src='';this.style.background='var(--dark4)'">
        <div class="player-info">
          <h2>${esc(full.strPlayer)}</h2>
          <div class="player-meta">
            <span>${flag(full.strNationality)} ${esc(full.strNationality||'—')}</span>
            <span>⚽ ${esc(full.strPosition||'—')}</span>
            <span>📅 ${full.dateBorn||'—'}${full.dateBorn?' ('+age(full.dateBorn)+' år)':''}</span>
            <span>🏙 ${esc(full.strCity||full.strBirthLocation||'—')}</span>
          </div>
          <div class="stat-pills">
            <div class="stat-pill"><div class="n">${esc(full.strHeight||'—')}</div><div class="l">Längd</div></div>
            <div class="stat-pill"><div class="n">${esc(full.strWeight||'—')}</div><div class="l">Vikt</div></div>
            <div class="stat-pill"><div class="n">${esc(full.strTeam||p._team||'—')}</div><div class="l">Lag</div></div>
          </div>
          ${(full.strDescriptionEN||full.strBiography) ? `<p style="font-size:12px;color:var(--muted);line-height:1.65;max-width:650px;margin-top:.75rem">${esc((full.strDescriptionEN||full.strBiography).slice(0,500))}…</p>` : ''}
        </div>
      </div>
      <button class="send-btn" style="font-size:13px" onclick="searchPlayer('${esc(full.strPlayer)}')">
        Sök säsongsstatistik med AI ↗
      </button>`;
  } catch(e) {
    el.innerHTML += `<div style="color:#f08080;font-size:13px">Fel: ${esc(e.message)}</div>`;
  }
}

function searchPlayer(name) {
  showPage('search', document.querySelectorAll('.nav-btn')[6]);
  setTimeout(()=>askAI(`Visa statistik för ${name} i Allsvenskan 2026 – mål, assist, spelade matcher`), 80);
}

/* ── STANDINGS ── */
function renderStandings() {
  const tbl = buildTable();
  if (!tbl.length) return `<div class="page-title"><h1>Tabell</h1></div><div class="info-banner">Inga matchresultat hittades för säsongen ${SEASON}.</div>`;
  const rows = tbl.map((t,i)=>{
    const gd = t.gf-t.ga;
    return `<tr>
      <td style="font-weight:500;font-size:13px">${i+1}</td>
      <td><div class="badge-team"><img src="${t.badge||''}" onerror="this.style.display='none'" loading="lazy"><span>${esc(t.name)}</span></div></td>
      <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td style="color:${gd>=0?'var(--green)':'var(--red)'}">${gd>0?'+'+gd:gd}</td>
      <td class="td-num">${t.pts}</td>
    </tr>`;}).join('');
  return `<div class="page-title"><h1>Tabell</h1><span>${S.events.length} matcher inräknade</span></div>
    <div class="table-wrap"><div style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Lag</th><th>MP</th><th>V</th><th>O</th><th>F</th><th>GM</th><th>GI</th><th>GS</th><th>P</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

function buildTable() {
  const m={};
  S.teams.forEach(t=>{ m[t.strTeam]={name:t.strTeam,badge:t.strTeamBadge,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  S.events.forEach(e=>{
    const hs=parseInt(e.intHomeScore), as_=parseInt(e.intAwayScore);
    if (isNaN(hs)||isNaN(as_)) return;
    const h=m[e.strHomeTeam], a=m[e.strAwayTeam];
    if (!h||!a) return;
    h.mp++; a.mp++; h.gf+=hs; h.ga+=as_; a.gf+=as_; a.ga+=hs;
    if (hs>as_){h.w++;h.pts+=3;a.l++;}
    else if (hs<as_){a.w++;a.pts+=3;h.l++;}
    else{h.d++;a.d++;h.pts++;a.pts++;}
  });
  return Object.values(m).filter(t=>t.mp>0).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

/* ── RESULTS ── */
function renderResults() {
  const evs = [...S.events].reverse().slice(0,60);
  if (!evs.length) return `<div class="page-title"><h1>Resultat</h1></div><div class="info-banner">Inga resultat hittades.</div>`;
  const rows = evs.map(e=>{
    const hs=e.intHomeScore, as_=e.intAwayScore;
    const score = (hs!==null&&as_!==null) ? `${hs} – ${as_}` : 'vs';
    return `<tr>
      <td style="font-size:11px;color:var(--muted)">${e.dateEvent||''}</td>
      <td style="text-align:right;font-weight:500">${esc(e.strHomeTeam)}</td>
      <td class="td-num" style="text-align:center;color:${hs>as_?'var(--green)':hs<as_?'var(--red)':'var(--muted)'}">${score}</td>
      <td style="font-weight:500">${esc(e.strAwayTeam)}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(e.strVenue||'')}</td>
    </tr>`;}).join('');
  return `<div class="page-title"><h1>Resultat</h1><span>Senaste ${evs.length} matcherna</span></div>
    <div class="table-wrap"><div style="overflow-x:auto"><table>
      <thead><tr><th>Datum</th><th style="text-align:right">Hemma</th><th style="text-align:center">Resultat</th><th>Borta</th><th>Arena</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

/* ── TEAMS ── */
function renderTeams() {
  const cards = S.teams.map(t=>`
    <div class="team-card" onclick="openTeam('${t.idTeam}')">
      <img src="${t.strTeamBadge||''}" alt="${esc(t.strTeam)}" onerror="this.style.display='none'" loading="lazy">
      <div class="name">${esc(t.strTeam)}</div>
      <div class="sub">${t.intFormedYear?'Grundat '+t.intFormedYear:''}</div>
    </div>`).join('');
  return `<div class="page-title"><h1>Lag</h1><span>${S.teams.length} lag</span></div><div class="team-grid">${cards}</div>`;
}

function openTeam(id) {
  const t = S.teams.find(x=>x.idTeam===id);
  if (!t) return;
  const players = (S.players[id]||[]);
  const rows = players.map((p,i)=>`
    <tr style="cursor:pointer" onclick="openPlayer('${p.idPlayer}')">
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:7px">
        <img src="${p.strThumb||''}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--dark4)" onerror="this.style.display='none'" loading="lazy">
        <span style="font-weight:500">${esc(p.strPlayer)}</span>
      </div></td>
      <td><span class="td-pos">${esc(p.strPosition||'—')}</span></td>
      <td>${p.dateBorn?age(p.dateBorn)+' år':'—'}</td>
      <td style="font-size:12px">${flag(p.strNationality)} ${esc(p.strNationality||'—')}</td>
    </tr>`).join('');
  document.getElementById('mainContent').innerHTML = `
    <button class="back-btn" onclick="showPage('teams',null)">← Tillbaka till lag</button>
    <div class="player-header">
      <img src="${t.strTeamBadge||''}" style="width:80px;height:80px;object-fit:contain;border-radius:8px;background:var(--dark3)" onerror="this.style.display='none'">
      <div class="player-info">
        <h2>${esc(t.strTeam)}</h2>
        <div class="player-meta">
          ${t.intFormedYear?`<span>⚽ Grundat ${t.intFormedYear}</span>`:''}
          ${t.strStadium?`<span>🏟 ${esc(t.strStadium)}</span>`:''}
          ${t.strCity?`<span>📍 ${esc(t.strCity)}</span>`:''}
        </div>
        ${t.strDescriptionEN?`<p style="font-size:12px;color:var(--muted);line-height:1.65;max-width:650px;margin-top:.5rem">${esc(t.strDescriptionEN.slice(0,350))}…</p>`:''}
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-toolbar"><h3>Spelartrupp — ${esc(t.strTeam)}</h3></div>
      <table><thead><tr><th>#</th><th>Spelare</th><th>Position</th><th>Ålder</th><th>Nationalitet</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted)">Inga spelare</td></tr>'}</tbody></table>
    </div>`;
}

/* ── COMPARE ── */
function renderCompare() {
  const opts = S.teams.map(t=>`<optgroup label="${esc(t.strTeam)}">`+
    (S.players[t.idTeam]||[]).map(p=>`<option value="${p.idPlayer}|${t.idTeam}">${esc(p.strPlayer)}</option>`).join('')+
    '</optgroup>').join('');
  return `
    <div class="page-title"><h1>Jämför spelare</h1></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Spelare A</label>
        <select class="filter-select" style="width:100%" onchange="pickCmp('A',this.value)">${opts}</select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Spelare B</label>
        <select class="filter-select" style="width:100%" onchange="pickCmp('B',this.value)">${opts}</select>
      </div>
    </div>
    <div id="cmpResult"><div style="text-align:center;padding:3rem;color:var(--muted);font-size:13px">Välj två spelare ovan</div></div>`;
}

function pickCmp(slot, val) {
  const [pid,tid] = val.split('|');
  S['cmp'+slot] = (S.players[tid]||[]).find(p=>p.idPlayer===pid);
  drawCmp();
}

function drawCmp() {
  const el = document.getElementById('cmpResult');
  if (!el) return;
  const a=S.cmpA, b=S.cmpB;
  if (!a||!b) return;
  const row=(l,va,vb)=>`<tr><td style="color:var(--muted);font-size:12px;padding:8px 12px">${l}</td><td style="padding:8px 12px">${va||'—'}</td><td style="padding:8px 12px">${vb||'—'}</td></tr>`;
  el.innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>Statistik</th><th>${esc(a.strPlayer)}</th><th>${esc(b.strPlayer)}</th></tr></thead>
      <tbody>
        ${row('Lag',a._team,b._team)}
        ${row('Position',a.strPosition,b.strPosition)}
        ${row('Nationalitet',`${flag(a.strNationality)} ${a.strNationality}`,`${flag(b.strNationality)} ${b.strNationality}`)}
        ${row('Ålder',a.dateBorn?age(a.dateBorn)+' år':'—',b.dateBorn?age(b.dateBorn)+' år':'—')}
        ${row('Längd',a.strHeight,b.strHeight)}
        ${row('Vikt',a.strWeight,b.strWeight)}
      </tbody>
    </table></div>
    <div style="margin-top:1rem">
      <button class="send-btn" style="font-size:13px" onclick="cmpAI('${esc(a.strPlayer)}','${esc(b.strPlayer)}')">Jämför med AI-statistik ↗</button>
    </div>`;
}

function cmpAI(a,b) {
  showPage('search', document.querySelectorAll('.nav-btn')[6]);
  setTimeout(()=>askAI(`Jämför ${a} och ${b} i Allsvenskan 2026 – mål, assist, spelade matcher, rating`),80);
}

/* ── AI SEARCH ── */
const SYSTEM_PROMPT = `Du är en expert på Allsvenskan – Sveriges högsta fotbollsserie.
Din uppgift är att hjälpa journalister och fotbollsfans med korrekt, aktuell statistik.
Sök alltid på webben. Bästa källor: fotmob.com, fbref.com, bolldata.se, transfermarkt.se, svenskfotboll.se.
Svara alltid på svenska. Använd tabeller (| markdown) när det passar.
Aktuell säsong: Allsvenskan 2026 (mars–november 2026). Idag: ${new Date().toLocaleDateString('sv-SE')}.`;

function renderSearch() {
  return `
    <div class="page-title"><h1>AI-statistiksökning</h1><span>Realtidsdata via webbsökning</span></div>
    <div class="chat-wrap" id="chatWrap">
      <div class="chat-head"><div class="dot-live"></div>Claude AI med webbsökning — Allsvenskan 2026</div>
      <div class="chat-msgs" id="chatMsgs">
        ${S.chatHistory.length?'':'<div style="text-align:center;padding:2.5rem;color:var(--muted);font-size:13px"><div style="font-size:36px;margin-bottom:.75rem">⚽</div>Ställ valfri fråga om statistik, spelare eller matcher</div>'}
        ${S.chatHistory.map(m=>`<div class="msg-${m.role==='user'?'user':'ai'}"><div class="msg-role">${m.role==='user'?'Du':'Allsvenskan AI'}</div><div class="msg-bubble">${m.role==='assistant'?mdToHtml(m.text):esc(m.text)}</div></div>`).join('')}
      </div>
      <div class="chip-row">
        <span class="chip" onclick="askAI('Vem leder skytteligan i Allsvenskan 2026?')">Skytteliga 2026</span>
        <span class="chip" onclick="askAI('Flest assist i Allsvenskan 2026 hittills')">Assist-topp</span>
        <span class="chip" onclick="askAI('Malmö FF spelares statistik 2026')">Malmö FF</span>
        <span class="chip" onclick="askAI('Bästa målvakter i Allsvenskan 2026 – räddningsprocent och insläppt')">Målvakter</span>
        <span class="chip" onclick="askAI('Unga spelare under 21 som presterat bäst i Allsvenskan 2026')">U21-talanger</span>
        <span class="chip" onclick="askAI('Senaste resultaten i Allsvenskan 2026')">Senaste resultat</span>
      </div>
      <div class="chat-input-row">
        <textarea id="aiInput" rows="1" placeholder="Fråga om mål, assist, form, spelare…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
        <button class="send-btn" id="aiSend" onclick="sendAI()">SKICKA</button>
      </div>
    </div>`;
}

function scrollChat() { setTimeout(()=>{const e=document.getElementById('chatMsgs');if(e)e.scrollTop=e.scrollHeight},50); }

function askAI(q) {
  const inp=document.getElementById('aiInput');
  if (!inp) return;
  inp.value=q; sendAI();
}

async function sendAI() {
  const inp=document.getElementById('aiInput'), msgs=document.getElementById('chatMsgs'), btn=document.getElementById('aiSend');
  if (!inp||S.chatLoading) return;
  const text=inp.value.trim(); if (!text) return;
  inp.value=''; inp.style.height='auto';
  S.chatLoading=true; if(btn) btn.disabled=true;
  const w=msgs.querySelector('div[style*="text-align:center"]'); if(w) w.remove();
  S.chatHistory.push({role:'user',text});
  msgs.innerHTML+=`<div class="msg-user"><div class="msg-role">Du</div><div class="msg-bubble">${esc(text)}</div></div>`;
  const aid='a'+Date.now();
  msgs.innerHTML+=`<div class="msg-ai" id="${aid}"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:11px;color:var(--muted);margin-left:6px">Söker data…</span></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try {
    const apiMsgs = S.chatHistory.map(m=>({
      role: m.role==='user'?'user':'assistant',
      content: m.role==='assistant'?(m.raw||m.text):m.text
    }));
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYSTEM_PROMPT,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:apiMsgs
      })
    });
    const data=await resp.json();
    if (data.error) throw new Error(data.error.message);
    const raw=data.content||[];
    const ansText=raw.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'Inget svar.';
    S.chatHistory.push({role:'assistant',text:ansText,raw});
    const ae=document.getElementById(aid);
    if(ae) ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble">${mdToHtml(ansText)}</div></div>`;
  } catch(e) {
    const ae=document.getElementById(aid);
    if(ae) ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble" style="color:#f08080">Fel: ${esc(e.message)}</div></div>`;
    S.chatHistory.pop();
  }
  S.chatLoading=false; if(btn) btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

/* ── GLOBAL SEARCH ── */
function doGlobalSearch(v) {
  if (!v.trim()) return;
  document.getElementById('globalSearch').value='';
  showPage('search', document.querySelector('.nav-btn:last-child'));
  setTimeout(()=>askAI(v.trim()),80);
}

/* ── HELPERS ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function age(d){ const b=new Date(d),n=new Date(); let a=n.getFullYear()-b.getFullYear(); if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--; return a; }
const FLAGS={Sweden:'🇸🇪',Nigeria:'🇳🇬',Ghana:'🇬🇭',Finland:'🇫🇮',Norway:'🇳🇴',Denmark:'🇩🇰',Brazil:'🇧🇷',Argentina:'🇦🇷',England:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',Scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',France:'🇫🇷',Spain:'🇪🇸',Portugal:'🇵🇹',Germany:'🇩🇪',Italy:'🇮🇹',Netherlands:'🇳🇱',Poland:'🇵🇱',Serbia:'🇷🇸',Croatia:'🇭🇷',Kosovo:'🇽🇰',Albania:'🇦🇱',Iceland:'🇮🇸',Ireland:'🇮🇪',USA:'🇺🇸',Senegal:'🇸🇳',Morocco:'🇲🇦',Cameroon:'🇨🇲',Tunisia:'🇹🇳'};
function flag(n){ return FLAGS[n]||'🌍'; }

function mdToHtml(txt) {
  const lines=txt.split('\n'); let out='',inT=false;
  for (const line of lines) {
    if (/^\|/.test(line)&&/\|$/.test(line.trim())) {
      if (!inT){out+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;margin:8px 0">';inT=true;}
      if (/^[\|\s:-]+$/.test(line.replace(/\|/g,''))) continue;
      const cs=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      out+='<tr>'+cs.map(c=>`<td style="padding:5px 10px;border:1px solid var(--border);font-size:12px">${inl(c.trim())}</td>`).join('')+'</tr>';
    } else {
      if(inT){out+='</table></div>';inT=false;}
      if (/^### /.test(line)) out+=`<strong style="font-size:14px;color:var(--gold);display:block;margin:8px 0 3px">${inl(line.slice(4))}</strong>`;
      else if (/^## /.test(line)) out+=`<strong style="font-size:15px;color:var(--gold);display:block;margin:10px 0 4px">${inl(line.slice(3))}</strong>`;
      else if (/^# /.test(line)) out+=`<strong style="font-size:16px;color:var(--gold);display:block;margin:12px 0 5px">${inl(line.slice(2))}</strong>`;
      else if (/^[-*] /.test(line)) out+=`<div style="display:flex;gap:6px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span>${inl(line.slice(2))}</div>`;
      else if (line.trim()==='') out+='<br>';
      else out+=inl(line)+'<br>';
    }
  }
  if(inT) out+='</table></div>';
  return out;
}
function inl(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>'); }

boot();
</script>
