<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllsvenskanAI — Statistik & Data</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8C547;--gold-dim:#b89a25;
  --dark:#0D0F14;--dark2:#161921;--dark3:#1E2230;--dark4:#252a3a;
  --border:rgba(232,197,71,0.12);--border-hi:rgba(232,197,71,0.38);
  --text:#E8EAF0;--muted:#6A7090;
  --red:#E24B4A;--green:#4CAF50;--blue:#4A9EFF;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:60px;position:sticky;top:0;z-index:200}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);cursor:pointer;white-space:nowrap}
.logo em{color:var(--text);opacity:.4;font-style:normal}
.season-badge{font-size:11px;font-weight:500;background:rgba(232,197,71,.12);color:var(--gold);border:1px solid var(--border-hi);border-radius:20px;padding:3px 10px;flex-shrink:0}
#globalSearch{margin-left:auto;background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;outline:none;width:220px;transition:border-color .2s}
#globalSearch:focus{border-color:var(--border-hi)}
#globalSearch::placeholder{color:var(--muted)}
.layout{display:flex;flex:1;min-height:0}
nav{width:210px;min-width:210px;background:var(--dark2);border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto;display:flex;flex-direction:column}
.nav-section{padding:.6rem 1rem .2rem;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.nav-btn:hover{background:var(--dark3)}
.nav-btn.active{background:var(--dark3);color:var(--gold);border-left-color:var(--gold)}
main{flex:1;overflow-y:auto;padding:1.75rem 2rem}
.page-title{display:flex;align-items:baseline;gap:12px;margin-bottom:1.5rem}
.page-title h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;color:var(--gold);line-height:1}
.page-title span{font-size:13px;color:var(--muted)}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:1.25rem;display:flex;align-items:center;gap:5px;padding:0;transition:color .15s}
.back-btn:hover{color:var(--text)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.team-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:border-color .2s,background .2s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.team-card:hover{border-color:var(--border-hi);background:var(--dark3)}
.team-card img{width:64px;height:64px;object-fit:contain}
.team-card .tname{font-size:13px;font-weight:500;line-height:1.3}
.team-card .tsub{font-size:11px;color:var(--muted)}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:.75rem 0}
.stat-pill{background:var(--dark3);border-radius:8px;padding:.6rem 1rem;text-align:center;min-width:80px}
.stat-pill .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1}
.stat-pill .l{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.hero{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap}
.hero-logo{width:90px;height:90px;object-fit:contain;flex-shrink:0;border-radius:8px;background:var(--dark3);padding:8px}
.hero-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--dark3);border:2px solid var(--border)}
.hero-info h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--gold);line-height:1}
.hero-meta{font-size:12px;color:var(--muted);margin:.3rem 0 .75rem;display:flex;flex-wrap:wrap;gap:0 14px;line-height:1.8}
.table-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-toolbar h3{font-size:14px;font-weight:500;margin-right:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
tr.clickable{cursor:pointer}
.td-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
.td-pos{font-size:11px;background:var(--dark3);border-radius:4px;padding:2px 7px;color:var(--muted);white-space:nowrap}
.player-row{display:flex;align-items:center;gap:8px}
.player-row img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--dark4)}
.player-row .pname{font-weight:500}
.player-row .psub{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.transfer-item{display:flex;align-items:center;gap:12px;padding:10px 1rem;border-bottom:1px solid var(--border)}
.transfer-item:last-child{border-bottom:none}
.transfer-type{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.type-loan{background:rgba(74,158,255,.15);color:#8bb8ff}
.type-free{background:rgba(76,175,80,.15);color:#81c784}
.type-paid{background:rgba(232,197,71,.15);color:var(--gold)}
.form-dots{display:flex;gap:3px}
.fd{width:9px;height:9px;border-radius:50%}
.fw{background:var(--green)}.fd-draw{background:#555}.fl{background:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:4rem;color:var(--muted);font-size:14px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.err{background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.3);border-radius:8px;padding:1rem;color:#f08080;font-size:13px;margin:1rem 0;line-height:1.6}
.ai-btn{background:rgba(232,197,71,.1);border:1px solid var(--border-hi);border-radius:7px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;transition:background .15s;margin-top:.5rem}
.ai-btn:hover{background:rgba(232,197,71,.2)}
.chat-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chat-head{background:var(--dark3);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-msgs{padding:1.25rem;min-height:240px;max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.msg-user,.msg-ai{display:flex;flex-direction:column;gap:4px}
.msg-role{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.msg-ai .msg-role{color:var(--gold-dim)}
.msg-bubble{background:var(--dark3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.msg-user .msg-bubble{background:var(--dark4);border-color:var(--border-hi)}
.dots{display:flex;gap:4px;padding:2px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.7;animation:bns 1.1s infinite}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bns{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-6px);opacity:1}}
.chat-input-row{border-top:1px solid var(--border);padding:.9rem 1.25rem;display:flex;gap:8px}
.chat-input-row textarea{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;min-height:38px;max-height:110px;line-height:1.5;transition:border-color .2s}
.chat-input-row textarea:focus{border-color:var(--border-hi)}
.chat-input-row textarea::placeholder{color:var(--muted)}
.send-btn{background:var(--gold);color:var(--dark);border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:9px 18px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.35;cursor:not-allowed}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 1.25rem;border-top:1px solid var(--border)}
.chip{background:var(--dark3);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;padding:4px 11px;cursor:pointer;transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--border-hi);color:var(--text)}
@media(max-width:768px){nav{display:none}main{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="showPage('teams')">Allsvenskan <em>/</em> AI</div>
  <div class="season-badge">2026</div>
  <input id="globalSearch" type="text" placeholder="Sök spelare eller lag…" onkeydown="if(event.key==='Enter')doGlobalSearch(this.value)">
</header>
<div class="layout">
  <nav>
    <div class="nav-section">Liga</div>
    <button class="nav-btn active" onclick="showPage('teams',this)"><span>🛡</span> Lag & Spelare</button>
    <button class="nav-btn" onclick="showPage('standings',this)"><span>🏆</span> Tabell</button>
    <button class="nav-btn" onclick="showPage('results',this)"><span>📅</span> Resultat</button>
    <button class="nav-btn" onclick="showPage('transfers',this)"><span>🔄</span> Övergångar</button>
    <button class="nav-btn" onclick="showPage('topscorers',this)"><span>⚽</span> Skytteliga</button>
    <div class="nav-section">Verktyg</div>
    <button class="nav-btn" onclick="showPage('search',this)"><span>🔍</span> AI-sökning</button>
  </nav>
  <main id="mc"><div class="loading"><div class="spinner"></div>Laddar Allsvenskan…</div></main>
</div>
<script>
const LEAGUE=113, SEASON=2025, AF='/api/football';
const S={teams:[],chatHistory:[],chatLoading:false,currentTeamId:null};

async function af(ep,params={}){
  const q=new URLSearchParams({_endpoint:ep,...params});
  const r=await fetch(`${AF}?${q}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  if(d.errors&&Object.keys(d.errors).length) throw new Error(Object.values(d.errors).join(', '));
  return d.response||[];
}

async function boot(){
  try{
    const data=await af('teams',{league:LEAGUE,season:SEASON});
    S.teams=data.map(d=>d.team).sort((a,b)=>a.name.localeCompare(b.name,'sv'));
    showPage('teams',document.querySelector('.nav-btn.active'));
  }catch(e){
    mc().innerHTML=`<div class="err">⚠️ Kunde inte hämta data: ${esc(e.message)}<br><br>
    Lägg till <strong>APIFOOTBALL_KEY</strong> i Vercel → Settings → Environment Variables, sedan Redeploy.<br><br>
    Skaffa gratis API-nyckel på: <a href="https://dashboard.api-football.com" target="_blank" style="color:var(--blue)">dashboard.api-football.com</a></div>`;
  }
}

function mc(){return document.getElementById('mc')}

function showPage(page,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  S.page=page;
  const el=mc();
  switch(page){
    case'teams':      renderTeams(el);break;
    case'standings':  renderStandings(el);break;
    case'results':    renderResults(el);break;
    case'transfers':  renderTransfers(el);break;
    case'topscorers': renderTopScorers(el);break;
    case'search':     renderSearch(el);setTimeout(()=>{const e=document.getElementById('chatMsgs');if(e)e.scrollTop=e.scrollHeight},50);break;
  }
}

/* TEAMS */
function renderTeams(el){
  const cards=S.teams.map(t=>`
    <div class="team-card" onclick="openTeam(${t.id})">
      <img src="${t.logo}" onerror="this.style.opacity='.2'" loading="lazy">
      <div class="tname">${esc(t.name)}</div>
    </div>`).join('');
  el.innerHTML=`<div class="page-title"><h1>Lag</h1><span>${S.teams.length} lag</span></div>
    <div class="team-grid">${cards}</div>`;
}

/* TEAM DETAIL */
async function openTeam(teamId){
  S.currentTeamId=teamId;
  const team=S.teams.find(t=>t.id===teamId);
  if(!team)return;
  mc().innerHTML=`<button class="back-btn" onclick="showPage('teams')">← Alla lag</button>
    <div class="loading"><div class="spinner"></div>Hämtar lagdata…</div>`;
  try{
    const[statsArr,playersArr,transfersArr]=await Promise.all([
      af('teams/statistics',{league:LEAGUE,season:SEASON,team:teamId}),
      af('players',{league:LEAGUE,season:SEASON,team:teamId}),
      af('transfers',{team:teamId}),
    ]);
    const stats=Array.isArray(statsArr)?statsArr[0]:statsArr;
    const players=playersArr;
    const transfers=(transfersArr||[])
      .flatMap(t=>(t.transfers||[]).map(tr=>({...tr,player:t.player})))
      .filter(tr=>parseInt((tr.date||'').slice(0,4))>=2023)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    const form=stats?.fixtures?.form||'';
    const formDots=form.slice(-10).split('').map(c=>`<div class="fd ${c==='W'?'fw':c==='D'?'fd-draw':'fl'}"></div>`).join('');
    const w=stats?.fixtures?.wins?.total||0;
    const d=stats?.fixtures?.draws?.total||0;
    const l=stats?.fixtures?.loses?.total||0;
    const gf=stats?.goals?.for?.total?.total||0;
    const ga=stats?.goals?.against?.total?.total||0;

    const posOrder={Goalkeeper:1,Defender:2,Midfielder:3,Attacker:4};
    const sorted=[...players].sort((a,b)=>(posOrder[a.statistics?.[0]?.games?.position]||5)-(posOrder[b.statistics?.[0]?.games?.position]||5));

    const playerRows=sorted.map(p=>{
      const s=p.statistics?.[0]||{};
      const rating=s.games?.rating?parseFloat(s.games.rating).toFixed(1):'—';
      return`<tr class="clickable" onclick="openPlayer(${p.player.id},${teamId})">
        <td><div class="player-row">
          <img src="${p.player.photo||''}" onerror="this.style.opacity='.2'" loading="lazy">
          <div><div class="pname">${esc(p.player.name)}</div>
          <div class="psub">${flag(p.player.nationality)} ${esc(p.player.nationality||'—')}</div></div>
        </div></td>
        <td><span class="td-pos">${esc(s.games?.position||'—')}</span></td>
        <td>${p.player.age||'—'}</td>
        <td class="td-num">${s.games?.appearences||0}</td>
        <td class="td-num">${s.goals?.total||0}</td>
        <td class="td-num">${s.goals?.assists||0}</td>
        <td style="color:${rc(rating)};font-weight:500">${rating}</td>
      </tr>`;}).join('');

    const transferRows=transfers.slice(0,20).map(tr=>{
      const isIn=tr.teams?.in?.id===teamId;
      const fc=(tr.type||'').toLowerCase().includes('loan')?'type-loan':tr.type==='Free'?'type-free':'type-paid';
      return`<div class="transfer-item">
        <div style="flex:1">
          <div style="font-weight:500;font-size:13px">${esc(tr.player?.name||'—')}</div>
          <div style="font-size:11px;color:var(--muted)">${tr.date||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:${isIn?'var(--green)':'var(--red)'}">
          <img src="${isIn?(tr.teams?.out?.logo||''):(tr.teams?.in?.logo||'')}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.2'">
          ${isIn?'↙ IN från '+esc(tr.teams?.out?.name||'?'):'↗ UT till '+esc(tr.teams?.in?.name||'?')}
        </div>
        <span class="transfer-type ${fc}">${esc(tr.type||'?')}</span>
      </div>`;}).join('')||'<div class="empty">Inga övergångar hittades</div>';

    mc().innerHTML=`
      <button class="back-btn" onclick="showPage('teams')">← Alla lag</button>
      <div class="hero">
        <img class="hero-logo" src="${team.logo}" onerror="this.style.opacity='.2'">
        <div class="hero-info">
          <h2>${esc(team.name)}</h2>
          <div class="hero-meta">
            <span>🏟 ${esc(stats?.venue?.name||'—')}</span>
            <span>📍 ${esc(stats?.venue?.city||'—')}</span>
            ${stats?.venue?.capacity?`<span>👥 ${stats.venue.capacity.toLocaleString('sv-SE')} platser</span>`:''}
          </div>
          <div class="stat-row">
            <div class="stat-pill"><div class="n">${w}</div><div class="l">Vinster</div></div>
            <div class="stat-pill"><div class="n">${d}</div><div class="l">Oavgjorda</div></div>
            <div class="stat-pill"><div class="n">${l}</div><div class="l">Förluster</div></div>
            <div class="stat-pill"><div class="n">${gf}</div><div class="l">Gjorda mål</div></div>
            <div class="stat-pill"><div class="n">${ga}</div><div class="l">Insläppta</div></div>
          </div>
          ${form?`<div style="margin-top:.5rem"><div style="font-size:10px;color:var(--muted);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase">Form (senaste 10)</div><div class="form-dots">${formDots}</div></div>`:''}
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'ts')">Spelartrupp (${players.length})</button>
        <button class="tab" onclick="switchTab(this,'tt')">Övergångar (${transfers.length})</button>
      </div>
      <div id="ts">
        <div class="table-wrap"><div style="overflow-x:auto"><table>
          <thead><tr><th>Spelare</th><th>Position</th><th>Ålder</th><th title="Matcher">M</th><th title="Mål">⚽</th><th title="Assist">🎯</th><th title="Rating">★</th></tr></thead>
          <tbody>${playerRows||'<tr><td colspan="7" class="empty">Inga spelare</td></tr>'}</tbody>
        </table></div></div>
      </div>
      <div id="tt" style="display:none"><div class="table-wrap">${transferRows}</div></div>
      <button class="ai-btn" onclick="askTeamAI('${esc(team.name)}')">🔍 Fråga AI om ${esc(team.name)}</button>`;
  }catch(e){
    mc().innerHTML=`<button class="back-btn" onclick="showPage('teams')">← Alla lag</button>
      <div class="err">Fel: ${esc(e.message)}</div>`;
  }
}

function switchTab(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['ts','tt','ptab-stats','ptab-transfers'].forEach(x=>{const e=document.getElementById(x);if(e)e.style.display=x===id?'':'none';});
}

/* PLAYER DETAIL */
async function openPlayer(playerId,teamId){
  mc().innerHTML=`<button class="back-btn" onclick="openTeam(${teamId})">← Tillbaka till lag</button>
    <div class="loading"><div class="spinner"></div>Hämtar spelardata…</div>`;
  try{
    const[playerArr,transfersArr]=await Promise.all([
      af('players',{id:playerId,season:SEASON}),
      af('transfers',{player:playerId}),
    ]);
    const p=playerArr[0];
    if(!p) throw new Error('Spelare hittades inte');
    const pl=p.player, s=p.statistics?.[0]||{};
    const transfers=(transfersArr?.[0]?.transfers||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    const games=s.games?.appearences||0;
    const starts=s.games?.lineups||0;
    const mins=s.games?.minutes||0;
    const goals=s.goals?.total||0;
    const assists=s.goals?.assists||0;
    const shots=s.shots?.total||0;
    const shotsOT=s.shots?.on||0;
    const passes=s.passes?.total||0;
    const passAcc=s.passes?.accuracy||0;
    const tackles=s.tackles?.total||0;
    const interc=s.tackles?.interceptions||0;
    const yellow=s.cards?.yellow||0;
    const red=s.cards?.red||0;
    const drib=s.dribbles?.success||0;
    const duels=s.duels?.won||0;

  }catch(e){

}

/* TRANSFERS */
async function renderTransfers(el){
  el.innerHTML=`<div class="loading"><div class="spinner"></div>Hämtar övergångar…</div>`;
  try{
    const all=[];
    await Promise.all(S.teams.map(async t=>{
      try{
        const data=await af('transfers',{team:t.id});
        data.forEach(tr=>(tr.transfers||[]).forEach(x=>{
          if(parseInt((x.date||'').slice(0,4))>=2025)
            all.push({...x,playerName:tr.player?.name,playerPhoto:tr.player?.photo});

    }));
    all.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const rows=all.slice(0,100).map(tr=>{
      const fc=(tr.type||'').toLowerCase().includes('loan')?'type-loan':tr.type==='Free'?'type-free':'type-paid';
      return`<tr>
        <td style="font-size:11px;color:var(--muted)">${tr.date||'—'}</td>
        <td style="font-weight:500">${esc(tr.playerName||'—')}</td>
        <td><div style="display:flex;align-items:center;gap:5px">
          <img src="${tr.teams?.out?.logo||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.2'">
          <span style="font-size:12px">${esc(tr.teams?.out?.name||'?')}</span>
        </div></td>
        <td style="color:var(--muted)">→</td>
        <td><div style="display:flex;align-items:center;gap:5px">
          <img src="${tr.teams?.in?.logo||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.2'">
          <span style="font-size:12px">${esc(tr.teams?.in?.name||'?')}</span>

        <td><span class="transfer-type ${fc}">${esc(tr.type||'?')}</span></td>

/* AI SEARCH */
const SYS=`Du är expert på Allsvenskan – Sveriges högsta fotbollsserie. Hjälp journalister och fans med korrekt, aktuell statistik. Sök alltid på webben. Bästa källor: fotmob.com, fbref.com, bolldata.se, transfermarkt.com, svenskfotboll.se. Svara på svenska. Använd tabeller när det passar. Säsong: ${SEASON}.`;

function renderSearch(el){
  el.innerHTML=`
    <div class="page-title"><h1>AI-sökning</h1><span>Realtidsdata via webbsökning</span></div>
    <div class="chat-wrap">
      <div class="chat-head"><div class="dot-live"></div>Claude AI med webbsökning — Allsvenskan ${SEASON}</div>
      <div class="chat-msgs" id="chatMsgs">
        ${S.chatHistory.length?'':'<div style="text-align:center;padding:3rem;color:var(--muted);font-size:13px"><div style="font-size:36px;margin-bottom:.75rem">⚽</div>Ställ valfri fråga om statistik, övergångar eller matcher</div>'}
        ${S.chatHistory.map(m=>`<div class="msg-${m.role==='user'?'user':'ai'}"><div class="msg-role">${m.role==='user'?'Du':'Allsvenskan AI'}</div><div class="msg-bubble">${m.role==='assistant'?mdToHtml(m.text):esc(m.text)}</div></div>`).join('')}
      </div>
      <div class="chip-row">
        <span class="chip" onclick="askAI('Vem leder skytteligan i Allsvenskan ${SEASON}?')">Skytteliga</span>
        <span class="chip" onclick="askAI('Senaste övergångarna i Allsvenskan 2026')">Övergångar</span>
        <span class="chip" onclick="askAI('Marknadsvärden för spelare i Allsvenskan 2026')">Marknadsvärden</span>
        <span class="chip" onclick="askAI('Bästa unga talangerna under 21 i Allsvenskan 2026')">U21-talanger</span>
        <span class="chip" onclick="askAI('Malmö FF nyheter och form just nu')">Malmö FF</span>
      </div>
      <div class="chat-input-row">
        <textarea id="aiInput" rows="1" placeholder="Fråga om statistik, övergångar, marknadsvärden…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
        <button class="send-btn" id="aiSend" onclick="sendAI()">SKICKA</button>
      </div>
    </div>`;
}

function askAI(q){const i=document.getElementById('aiInput');if(i){i.value=q;sendAI();}}
function askTeamAI(n){showPage('search');setTimeout(()=>askAI(`Ge mig en fullständig analys av ${n} i Allsvenskan ${SEASON} – form, toppspelare, övergångar och marknadsvärden`),80);}
function askPlayerAI(n){showPage('search');setTimeout(()=>askAI(`Berätta allt om ${n} – statistik, marknadsvärde på transfermarkt, senaste nyheter och transferrykten`),80);}

async function sendAI(){
  const inp=document.getElementById('aiInput'),msgs=document.getElementById('chatMsgs'),btn=document.getElementById('aiSend');
  if(!inp||S.chatLoading)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  S.chatLoading=true;if(btn)btn.disabled=true;
  const w=msgs?.querySelector('div[style*="text-align:center"]');if(w)w.remove();
  S.chatHistory.push({role:'user',text});
  msgs.innerHTML+=`<div class="msg-user"><div class="msg-role">Du</div><div class="msg-bubble">${esc(text)}</div></div>`;
  const aid='a'+Date.now();
  msgs.innerHTML+=`<div class="msg-ai" id="${aid}"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:11px;color:var(--muted);margin-left:6px">Söker…</span></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYS,messages:S.chatHistory.map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='assistant'?(m.raw||m.text):m.text}))})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content||[];
    const ansText=raw.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'Inget svar.';
    S.chatHistory.push({role:'assistant',text:ansText,raw});
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble">${mdToHtml(ansText)}</div></div>`;
  }catch(e){
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble" style="color:#f08080">Fel: ${esc(e.message)}</div></div>`;
    S.chatHistory.pop();
  }
  S.chatLoading=false;if(btn)btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function doGlobalSearch(v){if(!v.trim())return;document.getElementById('globalSearch').value='';showPage('search');setTimeout(()=>askAI(v.trim()),80);}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const FLAGS={Sweden:'🇸🇪',Nigeria:'🇳🇬',Ghana:'🇬🇭',Finland:'🇫🇮',Norway:'🇳🇴',Denmark:'🇩🇰',Brazil:'🇧🇷',Argentina:'🇦🇷',England:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',Scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',France:'🇫🇷',Spain:'🇪🇸',Portugal:'🇵🇹',Germany:'🇩🇪',Italy:'🇮🇹',Netherlands:'🇳🇱',Poland:'🇵🇱',Serbia:'🇷🇸',Croatia:'🇭🇷',Kosovo:'🇽🇰',Albania:'🇦🇱',Iceland:'🇮🇸',Ireland:'🇮🇪',USA:'🇺🇸',Senegal:'🇸🇳',Morocco:'🇲🇦',Cameroon:'🇨🇲',Tunisia:'🇹🇳',Mali:'🇲🇱','Ivory Coast':'🇨🇮'};
function flag(n){return FLAGS[n]||'🌍';}
function rc(r){const v=parseFloat(r);if(isNaN(v))return'var(--text)';if(v>=7.5)return'var(--green)';if(v>=6.5)return'var(--gold)';return'var(--red)';}
function mdToHtml(txt){
  const lines=txt.split('\n');let out='',inT=false;
  for(const line of lines){
    if(/^\|/.test(line)&&/\|$/.test(line.trim())){
      if(!inT){out+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;margin:8px 0">';inT=true;}
      if(/^[\|\s:-]+$/.test(line.replace(/\|/g,'')))continue;
      const cs=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      out+='<tr>'+cs.map(c=>`<td style="padding:5px 10px;border:1px solid var(--border);font-size:12px">${inl(c.trim())}</td>`).join('')+'</tr>';
    }else{
      if(inT){out+='</table></div>';inT=false;}
      if(/^### /.test(line))out+=`<strong style="font-size:14px;color:var(--gold);display:block;margin:8px 0 3px">${inl(line.slice(4))}</strong>`;
      else if(/^## /.test(line))out+=`<strong style="font-size:15px;color:var(--gold);display:block;margin:10px 0 4px">${inl(line.slice(3))}</strong>`;
      else if(/^# /.test(line))out+=`<strong style="font-size:16px;color:var(--gold);display:block;margin:12px 0 5px">${inl(line.slice(2))}</strong>`;
      else if(/^[-*] /.test(line))out+=`<div style="display:flex;gap:6px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span>${inl(line.slice(2))}</div>`;
      else if(line.trim()==='')out+='<br>';
      else out+=inl(line)+'<br>';
    }
  }
  if(inT)out+='</table></div>';
  return out;
}
function inl(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}

boot();
