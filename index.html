<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllsvenskanAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="site-logo-link" aria-label="AllsvenskanAI startsida">
      <img src="logo-allsvenskanai.png" alt="AllsvenskanAI" class="site-logo">
    </a>

    <div class="topbar-copy">
      <p>Svensk fotboll, enkelt och snabbt.</p>
    </div>
  </header>

  <main class="container">
    <section class="league-switcher">
      <button class="league-btn active" data-league="allsvenskan">Allsvenskan</button>
      <button class="league-btn" data-league="damallsvenskan">Damallsvenskan</button>
    </section>

    <section class="card">
      <h2>Tabell</h2>
      <div id="standings-content">Här kommer tabellen att visas.</div>
    </section>

    <section class="card">
      <h2>Resultat</h2>
      <div id="results-content">Här kommer resultat att visas.</div>
    </section>

    <section class="card">
      <h2>Statistik</h2>
      <div id="stats-content">Här kommer statistik att visas.</div>
    </section>
  </main>

  <script src="team-names.js"></script>
  <script src="app.js"></script>
</body>
</html>
