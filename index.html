<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllsvenskanAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8C547;--dark:#0D0F14;--dark2:#161921;--dark3:#1E2230;--dark4:#252a3a;
  --border:rgba(232,197,71,0.1);--border-hi:rgba(232,197,71,0.35);
  --text:#E8EAF0;--muted:#6A7090;--red:#E24B4A;--green:#4CAF50;--blue:#4A9EFF;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
header{background:var(--dark2);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);text-decoration:none;cursor:pointer;white-space:nowrap}
.logo em{color:var(--text);opacity:.35;font-style:normal}
.search-bar{flex:1;max-width:420px;position:relative}
.search-bar input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px 7px 36px;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--border-hi)}
.search-bar input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--dark2);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;max-height:320px;overflow-y:auto;display:none}
.search-results.open{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .15s}
.sr-item:hover{background:var(--dark3)}
.sr-item img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--dark4);flex-shrink:0}
.sr-item .sr-name{font-size:13px;font-weight:500}
.sr-item .sr-sub{font-size:11px;color:var(--muted)}
.sr-loading{padding:1rem;text-align:center;color:var(--muted);font-size:13px}

/* NAV */
.nav-pills{margin-left:auto;display:flex;gap:2px}
.nav-pill{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:5px;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;white-space:nowrap}
.nav-pill:hover{background:var(--dark3);color:var(--text)}
.nav-pill.active{background:var(--dark3);color:var(--gold)}

/* MAIN */
main{flex:1;max-width:1200px;width:100%;margin:0 auto;padding:1.5rem 1.5rem;box-sizing:border-box}

/* PAGE TITLE */
.pg-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1.5px;color:var(--gold);margin-bottom:1.25rem;display:flex;align-items:baseline;gap:12px}
.pg-title small{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);font-weight:400;letter-spacing:0}
.back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;margin-bottom:1rem;padding:0;transition:color .15s}
.back:hover{color:var(--text)}

/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.team-card{background:var(--dark2);border:1px solid var(--border);border-radius:9px;padding:1.1rem;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.team-card:hover{border-color:var(--border-hi);transform:translateY(-1px)}
.team-card img{width:56px;height:56px;object-fit:contain}
.team-card .tc-name{font-size:12px;font-weight:500;line-height:1.3}
.team-card .tc-sub{font-size:10px;color:var(--muted)}

/* PROFILE HEADER */
.profile{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;gap:1.25rem;align-items:flex-start;flex-wrap:wrap}
.profile-img{width:76px;height:76px;object-fit:contain;flex-shrink:0;border-radius:8px;background:var(--dark3);padding:6px}
.profile-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--dark3);border:2px solid var(--border)}
.profile-body{flex:1;min-width:180px}
.profile-body h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--gold);line-height:1;margin-bottom:.3rem}
.profile-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:0 14px;line-height:1.9;margin-bottom:.6rem}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:var(--dark3);border-radius:7px;padding:.5rem .85rem;text-align:center;min-width:70px}
.pill .pn{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.pill .pl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.mv-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,197,71,.1);border:1px solid var(--border-hi);border-radius:6px;padding:4px 12px;font-size:13px;color:var(--gold);font-weight:500;margin-top:.5rem}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem;gap:0}
.tab{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* TABLE */
.tbl-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:1.25rem}
.tbl-head{display:flex;align-items:center;padding:.65rem 1rem;border-bottom:1px solid var(--border);gap:10px}
.tbl-head h3{font-size:13px;font-weight:500;flex:1}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{font-size:13px;padding:7px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr.hover:hover td{background:rgba(255,255,255,.02)}
tr.link{cursor:pointer}
.num{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold)}
.pos-tag{font-size:10px;background:var(--dark3);border-radius:3px;padding:2px 6px;color:var(--muted);white-space:nowrap}
.pcell{display:flex;align-items:center;gap:8px}
.pcell img{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--dark4);flex-shrink:0}
.pcell .pn{font-weight:500;font-size:13px}
.pcell .ps{font-size:11px;color:var(--muted)}
.form-row{display:flex;gap:3px}
.fd{width:8px;height:8px;border-radius:50%}
.fw{background:var(--green)}.fd-d{background:#555}.fl{background:var(--red)}
.pos-sep td{background:var(--dark3);color:var(--gold);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:5px 12px}

/* AI PANEL */
.ai-panel{background:var(--dark2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:1.25rem}
.ai-head{background:var(--dark3);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-body{padding:1rem}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.7;animation:bns 1.1s infinite;display:inline-block;margin-right:3px}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bns{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-5px);opacity:1}}
.ai-content{font-size:13px;line-height:1.7;color:var(--text)}
.ai-content table{margin:8px 0;border-collapse:collapse;width:100%}
.ai-content td,.ai-content th{padding:5px 10px;border:1px solid var(--border);font-size:12px}
.ai-content th{background:var(--dark3);color:var(--muted);font-size:10px;letter-spacing:.8px;text-transform:uppercase}
.ai-content strong{color:var(--gold)}
.ai-btn{background:rgba(232,197,71,.1);border:1px solid var(--border-hi);border-radius:6px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;cursor:pointer;transition:background .15s;white-space:nowrap}
.ai-btn:hover{background:rgba(232,197,71,.18)}

/* CHAT */
.chat-msgs{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:.85rem;padding:1rem}
.msg-u,.msg-a{display:flex;flex-direction:column;gap:3px}
.msg-role{font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.msg-a .msg-role{color:rgba(232,197,71,.5)}
.msg-bubble{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;line-height:1.65}
.msg-u .msg-bubble{background:var(--dark4);border-color:var(--border-hi)}
.chat-input{border-top:1px solid var(--border);padding:.85rem 1rem;display:flex;gap:8px}
.chat-input textarea{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none;resize:none;min-height:36px;max-height:100px;line-height:1.5;transition:border-color .2s}
.chat-input textarea:focus{border-color:var(--border-hi)}
.chat-input textarea::placeholder{color:var(--muted)}
.send{background:var(--gold);color:var(--dark);border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;padding:8px 16px;cursor:pointer;white-space:nowrap}
.send:hover{opacity:.85}
.send:disabled{opacity:.35;cursor:not-allowed}
.chips{display:flex;gap:5px;flex-wrap:wrap;padding:.65rem 1rem;border-top:1px solid var(--border)}
.chip{background:var(--dark3);border:1px solid var(--border);border-radius:16px;color:var(--muted);font-size:11px;padding:3px 10px;cursor:pointer;transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--border-hi);color:var(--text)}

/* MISC */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:3.5rem;color:var(--muted);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.err{background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.25);border-radius:8px;padding:.85rem 1rem;color:#f08080;font-size:13px;margin:.75rem 0;line-height:1.6}
.share{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 9px;cursor:pointer;margin-left:auto}
.share:hover{border-color:var(--border-hi);color:var(--text)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.two-col{grid-template-columns:1fr}.nav-pills{display:none}}
</style>
</head>
<body>
<header>
  <span class="logo" onclick="go('/')">Allsvenskan <em>/</em> AI</span>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="Sök spelare, lag…" autocomplete="off"
      oninput="onSearch(this.value)" onkeydown="onSearchKey(event)">
    <div class="search-results" id="searchResults"></div>
  </div>
  <nav class="nav-pills">
    <span class="nav-pill" onclick="go('/')">Lag</span>
    <span class="nav-pill" onclick="go('/tabell')">Tabell</span>
    <span class="nav-pill" onclick="go('/resultat')">Resultat</span>
    <span class="nav-pill" onclick="go('/overgangar')">Övergångar</span>
    <span class="nav-pill" onclick="go('/statistik')">Statistik</span>
    <span class="nav-pill" onclick="go('/sok')">AI-sökning</span>
  </nav>
</header>
<main id="main">
  <div class="loading"><div class="spinner"></div>Laddar Allsvenskan…</div>
</main>

<script>
// ─── CONFIG ──────────────────────────────────────────
const LEAGUE_ID = 573;
const SM_SEASON = 23584; // Allsvenskan 2025 (last completed)
const SEASON_NAME = '2025';

const C = {chatHistory:[], chatLoading:false};

// ─── ROUTING ─────────────────────────────────────────
function go(path, push=true) {
  if(push) history.pushState({},  '', path);
  updateNav(path);
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value = '';
  route(path);
}
function updateNav(path) {
  document.querySelectorAll('.nav-pill').forEach(p => {
    const href = p.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
    p.classList.toggle('active', href === path || (path==='/' && href==='/'));
  });
}
window.addEventListener('popstate', () => route(location.pathname));

function route(path) {
  const el = document.getElementById('main');
  if(path==='/'||path==='')              { pageTeams(el); return; }
  if(path==='/tabell')                   { pageStandings(el); return; }
  if(path==='/resultat')                 { pageResults(el); return; }
  if(path==='/overgangar')               { pageTransfers(el); return; }
  if(path==='/statistik')                { pageStats(el); return; }
  if(path==='/sok')                      { pageSearch(el); return; }
  const tm = path.match(/^\/lag\/(\d+)/);
  if(tm)                                 { pageTeam(el, +tm[1]); return; }
  const pm = path.match(/^\/spelare\/(\d+)/);
  if(pm)                                 { pagePlayer(el, +pm[1]); return; }
  el.innerHTML = `<div class="err">404 — Sidan hittades inte.</div>`;
}

// ─── API ─────────────────────────────────────────────
async function sm(ep, params={}) {
  const q = new URLSearchParams({_endpoint: ep, ...params});
  const r = await fetch(`/api/football?${q}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.message && !d.data) throw new Error(d.message);
  return d.data || d;
}

// Cache
const cache = {};
async function smCached(ep, params={}) {
  const key = ep + JSON.stringify(params);
  if(cache[key]) return cache[key];
  const d = await sm(ep, params);
  cache[key] = d;
  return d;
}

// ─── SEARCH ──────────────────────────────────────────
let searchTimer;
function onSearch(v) {
  clearTimeout(searchTimer);
  const box = document.getElementById('searchResults');
  if(!v.trim()) { box.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearch(v.trim()), 350);
}
async function doSearch(q) {
  const box = document.getElementById('searchResults');
  box.innerHTML = `<div class="sr-loading"><div class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:6px"></div>Söker…</div>`;
  box.classList.add('open');
  try {
    const [players, teams] = await Promise.all([
      sm('players/search/' + encodeURIComponent(q), {include:'teams'}),
      sm('teams/search/' + encodeURIComponent(q))
    ]);
    const pArr = Array.isArray(players) ? players.slice(0,5) : [];
    const tArr = Array.isArray(teams) ? teams.slice(0,3) : [];
    if(!pArr.length && !tArr.length) {
      box.innerHTML = `<div class="sr-loading">Inga resultat för "${q}"</div>`;
      return;
    }
    let html = '';
    tArr.forEach(t => {
      html += `<div class="sr-item" onclick="go('/lag/${t.id}')">
        <img src="${t.image_path||''}" onerror="this.style.opacity='.2'">
        <div><div class="sr-name">${esc(t.name)}</div><div class="sr-sub">Lag</div></div>
      </div>`;
    });
    pArr.forEach(p => {
      const team = p.teams?.[0]?.name || '';
      html += `<div class="sr-item" onclick="go('/spelare/${p.id}')">
        <img src="${p.image_path||''}" style="border-radius:50%" onerror="this.style.opacity='.2'">
        <div><div class="sr-name">${esc(p.display_name||p.name)}</div><div class="sr-sub">${esc(team)}</div></div>
      </div>`;
    });
    box.innerHTML = html;
  } catch(e) {
    box.innerHTML = `<div class="sr-loading" style="color:#f08080">Fel: ${esc(e.message)}</div>`;
  }
}
function onSearchKey(e) {
  if(e.key==='Escape') document.getElementById('searchResults').classList.remove('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('.search-bar')) document.getElementById('searchResults').classList.remove('open');
});

// ─── TEAMS PAGE ──────────────────────────────────────
async function pageTeams(el) {
  document.title = 'Allsvenskan AI';
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag…</div>`;
  try {
    // Get teams via fixtures - participants in fixtures = exact teams that played
    const fixData = await smCached('fixtures', {
      season_id: SM_SEASON, 
      include: 'participants',
      per_page: 10  // Just need a few fixtures to get all 16 teams
    });
    const fixtures = Array.isArray(fixData) ? fixData : (fixData.data||[]);
    
    // Collect unique teams from fixture participants
    const teamMap = new Map();
    fixtures.forEach(f => {
      (f.participants||[]).forEach(p => {
        if(!teamMap.has(p.id)) teamMap.set(p.id, p);
      });
    });
    
    // If we didn't get all 16, fetch more fixtures
    if(teamMap.size < 16) {
      const fix2 = await smCached('fixtures', {
        season_id: SM_SEASON,
        include: 'participants',
        per_page: 50,
        page: 2
      });
      const f2 = Array.isArray(fix2) ? fix2 : (fix2.data||[]);
      f2.forEach(f => (f.participants||[]).forEach(p => {if(!teamMap.has(p.id)) teamMap.set(p.id, p);}));
    }

    const teams = [...teamMap.values()].sort((a,b)=>a.name.localeCompare(b.name,'sv'));

    const cards = teams.map(t=>`
      <div class="team-card" onclick="go('/lag/${t.id}')">
        <img src="${t.image_path||''}" onerror="this.style.opacity='.15'" loading="lazy">
        <div class="tc-name">${esc(t.name)}</div>
      </div>`).join('');

    el.innerHTML = `
      <div class="pg-title">Lag <small>Allsvenskan ${SEASON_NAME} — ${teams.length} lag</small></div>
      <div class="team-grid">${cards}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="err">⚠️ ${esc(e.message)}</div>`;
  }
}

// ─── TEAM PAGE ───────────────────────────────────────
async function pageTeam(el, teamId) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag…</div>`;
  try {
    const [teamD, squadD] = await Promise.all([
      sm(`teams/${teamId}`, {include:'venue;statistics.details', filters:`teamStatisticSeasons:${SM_SEASON}`}),
      sm(`squads/teams/${teamId}`, {include:'player;player.position;player.nationality'}),
    ]);

    const team = Array.isArray(teamD) ? teamD[0] : teamD;
    const squad = Array.isArray(squadD) ? squadD : (squadD.data||[]);
    // Stats are now included in the team object
    const details = (team.statistics||[])[0]?.details || [];

    document.title = `${team.name} — AllsvenskanAI`;

    const g = (n) => details.find(d=>d.type?.name===n)?.value?.total ?? details.find(d=>d.type?.name===n)?.value ?? '—';
    const wins=g('Wins'), draws=g('Draws'), losses=g('Lost');
    const gf=g('Goals For'), ga=g('Goals Against'), cs=g('Clean Sheets');

    const posOrder = {Goalkeeper:1,Defender:2,Midfielder:3,Attacker:4};
    const posLabel = {Goalkeeper:'Målvakter',Defender:'Försvarare',Midfielder:'Mittfältare',Attacker:'Anfallare'};
    const sorted = [...squad].sort((a,b)=>(posOrder[a.player?.position?.name]||5)-(posOrder[b.player?.position?.name]||5));

    let lastPos='';
    const rows = sorted.map(s=>{
      const p=s.player||{};
      const pos=p.position?.name||'—';
      let sep='';
      if(pos!==lastPos&&posLabel[pos]){lastPos=pos;sep=`<tr class="pos-sep"><td colspan="5">${posLabel[pos]}</td></tr>`;}
      const mv = p.market_value ? `€${formatVal(p.market_value)}` : '—';
      return sep+`<tr class="link hover" onclick="go('/spelare/${p.id}')">
        <td><div class="pcell">
          <img src="${p.image_path||''}" onerror="this.style.opacity='.15'" loading="lazy">
          <div><div class="pn">${esc(p.display_name||p.name||'—')}</div>
          <div class="ps">${flag(p.nationality?.name)} ${esc(p.nationality?.name||'')}</div></div>
        </div></td>
        <td><span class="pos-tag">${esc(pos)}</span></td>
        <td>${p.date_of_birth?calcAge(p.date_of_birth)+' år':'—'}</td>
        <td>${p.height?p.height+'cm':'—'}</td>
        <td style="color:var(--gold);font-weight:500">${mv}</td>
      </tr>`;}).join('');

    el.innerHTML = `
      <button class="back" onclick="go('/')">← Alla lag</button>

// ─── RESULTS ─────────────────────────────────────────
async function pageResults(el) {
  document.title = 'Resultat — AllsvenskanAI';
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar matcher…</div>`;
  try {
    const [liveD, fixD] = await Promise.all([
      sm('livescores/inplay', {filters:`fixtureLeagues:${LEAGUE_ID}`, include:'participants;scores;state'}),
      sm('fixtures', {season_id: SM_SEASON, include:'participants;scores', per_page:50, sort:'-starting_at'})
    ]);
    const live = Array.isArray(liveD)?liveD:(liveD.data||[]);
    const recent = Array.isArray(fixD)?fixD:(fixD.data||[]);

    const fRow = (f, isLive=false) => {
      const home=f.participants?.find(p=>p.meta?.location==='home');
      const away=f.participants?.find(p=>p.meta?.location==='away');
      const hs=f.scores?.find(s=>s.participant_id===home?.id&&s.type?.name==='current')?.score?.goals??'—';
      const as_=f.scores?.find(s=>s.participant_id===away?.id&&s.type?.name==='current')?.score?.goals??'—';
      const score=hs!=='—'?`${hs} – ${as_}`:'vs';
      const col=+hs>+as_?'var(--green)':+hs<+as_?'var(--red)':'var(--muted)';
      return `<tr class="hover">
        <td style="font-size:11px;color:var(--muted)">${isLive?'<span style="background:rgba(226,75,74,.15);color:#f08080;border-radius:3px;font-size:10px;padding:2px 6px;font-weight:500">LIVE</span>':(f.starting_at||'').slice(0,10)}</td>
        <td style="text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:5px">
          <span style="font-weight:500">${esc(home?.name||'?')}</span>
          <img src="${home?.image_path||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
        </div></td>
        <td class="num" style="text-align:center;color:${col}">${score}</td>
        <td><div style="display:flex;align-items:center;gap:5px">
          <img src="${away?.image_path||''}" style="width:16px;height:16px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span style="font-weight:500">${esc(away?.name||'?')}</span>
        </div></td>
      </tr>`;};

    const liveHtml = live.length?`
      <div class="pg-title" style="margin-top:1rem">Live <small>${live.length} matcher pågår</small></div>
      <div class="tbl-wrap"><div style="overflow-x:auto"><table>
        <thead><tr><th>Status</th><th style="text-align:right">Hemma</th><th style="text-align:center">Mål</th><th>Borta</th></tr></thead>
        <tbody>${live.map(f=>fRow(f,true)).join('')}</tbody>
      </table></div></div>`:'';

    el.innerHTML = `
      <div class="pg-title">Resultat & Live</div>
      ${liveHtml}
      <div class="tbl-wrap"><div style="overflow-x:auto"><table>
        <thead><tr><th>Datum</th><th style="text-align:right">Hemma</th><th style="text-align:center">Resultat</th><th>Borta</th></tr></thead>
        <tbody>${recent.map(f=>fRow(f)).join('')||'<tr><td colspan="4" class="empty">Inga matcher</td></tr>'}</tbody>
      </table></div></div>`;
  } catch(e) { el.innerHTML=`<div class="err">Fel: ${esc(e.message)}</div>`; }
}

        <td><span class="pos-tag">${esc(p.position?.name||'—')}</span></td>
        <td class="num" style="font-size:20px">${t.total||0}</td>
      </tr>`;});
    el.innerHTML = `
      <div class="pg-title">Skytteliga <small>Allsvenskan ${SEASON_NAME}</small></div>
      <div class="tbl-wrap"><div style="overflow-x:auto"><table>
        <thead><tr><th>#</th><th>Spelare</th><th>Lag</th><th>Position</th><th>⚽ Mål</th></tr></thead>
        <tbody>${rows.join('')||'<tr><td colspan="5" class="empty">Ingen data</td></tr>'}</tbody>
      </table></div></div>`;
  } catch(e) { el.innerHTML=`<div class="err">Fel: ${esc(e.message)}</div>`; }
}

        ${C.chatHistory.length?'':'<div style="text-align:center;padding:2.5rem;color:var(--muted);font-size:13px"><div style="font-size:32px;margin-bottom:.5rem">⚽</div>Fråga om spelare, marknadsvärden, övergångar, statistik…</div>'}
        ${C.chatHistory.map(m=>`<div class="msg-${m.role==='user'?'u':'a'}"><div class="msg-role">${m.role==='user'?'Du':'AI'}</div><div class="msg-bubble">${m.role==='assistant'?mdHtml(m.text):esc(m.text)}</div></div>`).join('')}

        <span class="chip" onclick="askAI('Bästa unga spelare under 21 i Allsvenskan 2025')">U21-talanger</span>
        <span class="chip" onclick="askAI('Malmö FF trupp och marknadsvärde 2025')">Malmö FF</span>
        <span class="chip" onclick="askAI('Hammarby säsong 2025 – analys och statistik')">Hammarby</span>
      </div>
      <div class="chat-input">
        <textarea id="chatInput" rows="1" placeholder="Fråga om spelare, lag, statistik, marknadsvärden…"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
        <button class="send" id="sendBtn" onclick="sendChat()">SKICKA</button>

function askAI(q){const i=document.getElementById('chatInput');if(i){i.value=q;sendChat();}}

const AISYS = `Du är expert på Allsvenskan och svensk fotboll. Hjälp med statistik, marknadsvärden och övergångar. Sök alltid på webben. Bästa källor: transfermarkt.com, fotmob.com, fbref.com, bolldata.se, svenskfotboll.se. Svara alltid på svenska. Använd markdown-tabeller när det passar. Var specifik och exakt.`;

async function sendChat() {
  const inp=document.getElementById('chatInput');
  const msgs=document.getElementById('chatMsgs');
  const btn=document.getElementById('sendBtn');
  if(!inp||C.chatLoading)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  C.chatLoading=true;if(btn)btn.disabled=true;
  const w=msgs?.querySelector('div[style*="text-align:center"]');if(w)w.remove();
  C.chatHistory.push({role:'user',text});
  msgs.innerHTML+=`<div class="msg-u"><div class="msg-role">Du</div><div class="msg-bubble">${esc(text)}</div></div>`;
  const aid='a'+Date.now();
  msgs.innerHTML+=`<div class="msg-a" id="${aid}"><div class="msg-role">AI</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div> Söker…</div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:AISYS,messages:C.chatHistory.map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='assistant'?(m.raw||m.text):m.text}))})});
    const d=await resp.json();
    if(d.error)throw new Error(d.error.message);
    const raw=d.content||[];
    const ansText=raw.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'Inget svar.';
    C.chatHistory.push({role:'assistant',text:ansText,raw});
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-a"><div class="msg-role">AI</div><div class="msg-bubble">${mdHtml(ansText)}</div></div>`;
  }catch(e){
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-a"><div class="msg-role">AI</div><div class="msg-bubble" style="color:#f08080">Fel: ${esc(e.message)}</div></div>`;
    C.chatHistory.pop();
  }
  C.chatLoading=false;if(btn)btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

// ─── HELPERS ─────────────────────────────────────────
function switchTab(btn,id){
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const tabs=['t-squad','t-ai','p-seasons','p-transfers'];
  tabs.forEach(x=>{const e=document.getElementById(x);if(e)e.style.display=x===id?'':'none';});
}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>{const b=event.target;const o=b.textContent;b.textContent='✅';setTimeout(()=>b.textContent=o,2000);});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function calcAge(d){const b=new Date(d),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function formatVal(v){if(!v||v==='—')return'—';const n=+v;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return n;}
function feeStyle(t){
  const s=(t||'').toLowerCase();
  if(s.includes('loan'))return'background:rgba(74,158,255,.15);color:#8bb8ff';
  if(s==='free')return'background:rgba(76,175,80,.15);color:#81c784';
  return'background:rgba(232,197,71,.15);color:var(--gold)';
}
const FLAGS={Sweden:'🇸🇪',Nigeria:'🇳🇬',Ghana:'🇬🇭',Finland:'🇫🇮',Norway:'🇳🇴',Denmark:'🇩🇰',Brazil:'🇧🇷',Argentina:'🇦🇷',England:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',Scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',France:'🇫🇷',Spain:'🇪🇸',Portugal:'🇵🇹',Germany:'🇩🇪',Italy:'🇮🇹',Netherlands:'🇳🇱',Poland:'🇵🇱',Serbia:'🇷🇸',Croatia:'🇭🇷',Kosovo:'🇽🇰',Albania:'🇦🇱',Iceland:'🇮🇸',Ireland:'🇮🇪',USA:'🇺🇸',Senegal:'🇸🇳',Morocco:'🇲🇦',Cameroon:'🇨🇲',Tunisia:'🇹🇳',Mali:'🇲🇱','Ivory Coast':'🇨🇮',Peru:'🇵🇪',Guinea:'🇬🇳','DR Congo':'🇨🇩',Romania:'🇷🇴',Bosnia:'🇧🇦',Slovakia:'🇸🇰',Hungary:'🇭🇺',Czech:'🇨🇿',Greece:'🇬🇷',Turkey:'🇹🇷',Ukraine:'🇺🇦',Austria:'🇦🇹',Switzerland:'🇨🇭',Belgium:'🇧🇪'};
function flag(n){return FLAGS[n]||'🌍';}
function mdHtml(txt) {
  const lines=txt.split('\n');let out='',inT=false;
  for(const line of lines){
    if(/^\|/.test(line)&&/\|$/.test(line.trim())){
      if(!inT){out+='<div style="overflow-x:auto"><table>';inT=true;}
      if(/^[\|\s:-]+$/.test(line.replace(/\|/g,'')))continue;
      const cells=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      const isHead = !inT || out.endsWith('<table>');
      const tag = isHead?'th':'td';
      out+=`<tr>${cells.map(c=>`<${tag}>${inl(c.trim())}</${tag}>`).join('')}</tr>`;
    } else {
      if(inT){out+='</table></div>';inT=false;}
      if(/^### /.test(line))out+=`<strong style="font-size:13px;color:var(--gold);display:block;margin:6px 0 2px">${inl(line.slice(4))}</strong>`;
      else if(/^## /.test(line))out+=`<strong style="font-size:14px;color:var(--gold);display:block;margin:8px 0 3px">${inl(line.slice(3))}</strong>`;
      else if(/^# /.test(line))out+=`<strong style="font-size:15px;color:var(--gold);display:block;margin:10px 0 4px">${inl(line.slice(2))}</strong>`;
      else if(/^[-*] /.test(line))out+=`<div style="display:flex;gap:5px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span>${inl(line.slice(2))}</div>`;
      else if(line.trim()==='')out+='<br>';
      else out+=inl(line)+'<br>';
    }
  }
  if(inT)out+='</table></div>';
  return out;
}
function inl(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
