<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllsvenskanAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#E8C547;--gold-dim:#b89a25;
  --dark:#0D0F14;--dark2:#161921;--dark3:#1E2230;--dark4:#252a3a;
  --border:rgba(232,197,71,0.12);--border-hi:rgba(232,197,71,0.38);
  --text:#E8EAF0;--muted:#6A7090;
  --red:#E24B4A;--green:#4CAF50;--blue:#4A9EFF;
}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:60px;position:sticky;top:0;z-index:200;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);cursor:pointer;white-space:nowrap;text-decoration:none}
.logo em{color:var(--text);opacity:.4;font-style:normal}
.season-badge{font-size:11px;font-weight:500;background:rgba(232,197,71,.12);color:var(--gold);border:1px solid var(--border-hi);border-radius:20px;padding:3px 10px;flex-shrink:0}
#globalSearch{margin-left:auto;background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 14px;outline:none;width:220px;transition:border-color .2s}
#globalSearch:focus{border-color:var(--border-hi)}
#globalSearch::placeholder{color:var(--muted)}
.layout{display:flex;flex:1;min-height:0}
nav{width:210px;min-width:210px;background:var(--dark2);border-right:1px solid var(--border);padding:1rem 0;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.nav-section{padding:.6rem 1rem .2rem;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;text-decoration:none}
.nav-btn:hover{background:var(--dark3)}
.nav-btn.active{background:var(--dark3);color:var(--gold);border-left-color:var(--gold)}
main{flex:1;overflow-y:auto;padding:1.75rem 2rem}
.page-title{display:flex;align-items:baseline;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
.page-title h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1.5px;color:var(--gold);line-height:1}
.page-title span{font-size:13px;color:var(--muted)}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:1.25rem;display:flex;align-items:center;gap:5px;padding:0;transition:color .15s;font-family:'DM Sans',sans-serif}
.back-btn:hover{color:var(--text)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.team-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:border-color .2s,background .2s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;text-decoration:none;color:var(--text)}
.team-card:hover{border-color:var(--border-hi);background:var(--dark3)}
.team-card img{width:64px;height:64px;object-fit:contain}
.team-card .tname{font-size:13px;font-weight:500;line-height:1.3}
.hero{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap}
.hero-logo{width:90px;height:90px;object-fit:contain;flex-shrink:0;border-radius:8px;background:var(--dark3);padding:8px}
.hero-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--dark3);border:2px solid var(--border)}
.hero-info{flex:1;min-width:200px}
.hero-info h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--gold);line-height:1}
.hero-meta{font-size:12px;color:var(--muted);margin:.3rem 0 .75rem;display:flex;flex-wrap:wrap;gap:0 14px;line-height:1.9}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:.75rem 0}
.stat-pill{background:var(--dark3);border-radius:8px;padding:.6rem 1rem;text-align:center;min-width:80px}
.stat-pill .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1}
.stat-pill .l{font-size:10px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.table-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.table-toolbar h3{font-size:14px;font-weight:500;margin-right:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
tr.clickable{cursor:pointer}
.td-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
.td-pos{font-size:11px;background:var(--dark3);border-radius:4px;padding:2px 7px;color:var(--muted);white-space:nowrap}
.player-cell{display:flex;align-items:center;gap:8px}
.player-cell img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:var(--dark4);flex-shrink:0}
.player-cell .pname{font-weight:500}
.player-cell .psub{font-size:11px;color:var(--muted)}
.transfer-item{display:flex;align-items:center;gap:10px;padding:10px 1rem;border-bottom:1px solid var(--border)}
.transfer-item:last-child{border-bottom:none}
.transfer-type{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.type-loan{background:rgba(74,158,255,.15);color:#8bb8ff}
.type-free{background:rgba(76,175,80,.15);color:#81c784}
.type-paid{background:rgba(232,197,71,.15);color:var(--gold)}
.form-dots{display:flex;gap:3px}
.fd{width:9px;height:9px;border-radius:50%}
.fw{background:var(--green)}.fd-d{background:#555}.fl{background:var(--red)}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:4rem;color:var(--muted);font-size:14px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.err{background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.3);border-radius:8px;padding:1rem;color:#f08080;font-size:13px;margin:1rem 0;line-height:1.7}
.ai-btn{background:rgba(232,197,71,.1);border:1px solid var(--border-hi);border-radius:7px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 14px;cursor:pointer;transition:background .15s;margin-top:.5rem;display:inline-block}
.ai-btn:hover{background:rgba(232,197,71,.2)}
.share-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer;margin-left:auto}
.share-btn:hover{border-color:var(--border-hi);color:var(--text)}
.live-badge{background:rgba(226,75,74,.15);color:#f08080;border:1px solid rgba(226,75,74,.3);border-radius:4px;font-size:10px;padding:2px 7px;font-weight:500;letter-spacing:.5px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.chat-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.chat-head{background:var(--dark3);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.chat-msgs{padding:1.25rem;min-height:240px;max-height:500px;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
.msg-user,.msg-ai{display:flex;flex-direction:column;gap:4px}
.msg-role{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.msg-ai .msg-role{color:var(--gold-dim)}
.msg-bubble{background:var(--dark3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.msg-user .msg-bubble{background:var(--dark4);border-color:var(--border-hi)}
.dots{display:flex;gap:4px;padding:2px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.7;animation:bns 1.1s infinite}
.dots span:nth-child(2){animation-delay:.18s}.dots span:nth-child(3){animation-delay:.36s}
@keyframes bns{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-6px);opacity:1}}
.chat-input-row{border-top:1px solid var(--border);padding:.9rem 1.25rem;display:flex;gap:8px}
.chat-input-row textarea{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;resize:none;min-height:38px;max-height:110px;line-height:1.5;transition:border-color .2s}
.chat-input-row textarea:focus{border-color:var(--border-hi)}
.chat-input-row textarea::placeholder{color:var(--muted)}
.send-btn{background:var(--gold);color:var(--dark);border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;padding:9px 18px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.35;cursor:not-allowed}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:.75rem 1.25rem;border-top:1px solid var(--border)}
.chip{background:var(--dark3);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:11px;padding:4px 11px;cursor:pointer;transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--border-hi);color:var(--text)}
.pos-header td{background:var(--dark3);color:var(--gold);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:6px 12px}
@media(max-width:768px){nav{display:none}main{padding:1rem}}
</style>
</head>
<body>
<header>
  <a class="logo" href="/" onclick="nav(event,'/')">Allsvenskan <em>/</em> AI</a>
  <div class="season-badge">2025</div>
  <input id="globalSearch" type="text" placeholder="Sök spelare eller lag…" onkeydown="if(event.key==='Enter')doSearch(this.value)">
</header>
<div class="layout">
  <nav>
    <div class="nav-section">Liga</div>
    <a class="nav-btn" href="/" onclick="nav(event,'/')"><span>🛡</span> Lag</a>
    <a class="nav-btn" href="/tabell" onclick="nav(event,'/tabell')"><span>🏆</span> Tabell</a>
    <a class="nav-btn" href="/resultat" onclick="nav(event,'/resultat')"><span>📅</span> Resultat & Live</a>
    <a class="nav-btn" href="/overgangar" onclick="nav(event,'/overgangar')"><span>🔄</span> Övergångar</a>
    <a class="nav-btn" href="/skytteliga" onclick="nav(event,'/skytteliga')"><span>⚽</span> Skytteliga</a>
    <div class="nav-section">Verktyg</div>
    <a class="nav-btn" href="/sok" onclick="nav(event,'/sok')"><span>🔍</span> AI-sökning</a>
  </nav>
  <main id="mc"><div class="loading"><div class="spinner"></div>Laddar Allsvenskan…</div></main>
</div>
<script>
// ── CONFIG ───────────────────────────────────────────
const LEAGUE_ID = 271;   // Allsvenskan i Sportmonks
const SEASON_ID = 23584; // Säsong 2025 i Sportmonks
const S = {teams:[], chatHistory:[], chatLoading:false, page:'/'};

// ── ROUTING ──────────────────────────────────────────
function nav(e, path) {
  if(e) e.preventDefault();
  history.pushState({}, '', path);
  route(path);
}
function route(path) {
  updateNav(path);
  const el = document.getElementById('mc');
  if(path==='/'||path==='')           { loadTeams(el); return; }
  if(path==='/tabell')                { loadStandings(el); return; }
  if(path==='/resultat')              { loadResults(el); return; }
  if(path==='/overgangar')            { loadTransfers(el); return; }
  if(path==='/skytteliga')            { loadTopScorers(el); return; }
  if(path==='/sok')                   { loadSearch(el); return; }
  const tm = path.match(/^\/lag\/(\d+)/);
  if(tm)                              { loadTeam(el, +tm[1]); return; }
  const pm = path.match(/^\/spelare\/(\d+)/);
  if(pm)                              { loadPlayer(el, +pm[1]); return; }
  el.innerHTML = `<div class="err">Sidan hittades inte.</div>`;
}
function updateNav(path) {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('href')===path||(path==='/'&&b.getAttribute('href')==='/'));
  });
}
window.addEventListener('popstate', ()=>route(location.pathname));

// ── API ───────────────────────────────────────────────
async function sm(endpoint, params={}) {
  const q = new URLSearchParams({_endpoint: endpoint, ...params});
  const r = await fetch(`/api/football?${q}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.message && !d.data) throw new Error(d.message);
  return d;
}

// ── BOOT ─────────────────────────────────────────────
async function boot() {
  try {
    // Get teams for season
    const d = await sm('teams', {season_id: SEASON_ID, include: 'venue'});
    S.teams = (d.data||[]).sort((a,b)=>a.name.localeCompare(b.name,'sv'));
  } catch(e) {
    console.warn('Boot error:', e.message);
  }
  route(location.pathname);
}

// ── TEAMS ─────────────────────────────────────────────
async function loadTeams(el) {
  if(!S.teams.length) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lag…</div>`;
    try {
      const d = await sm('teams', {season_id: SEASON_ID});
      S.teams = (d.data||[]).sort((a,b)=>a.name.localeCompare(b.name,'sv'));
    } catch(e) {
      el.innerHTML = `<div class="err">⚠️ ${esc(e.message)}<br>Kontrollera att <strong>SPORTMONKS_KEY</strong> är inlagd i Vercel → Settings → Environment Variables.</div>`;
      return;
    }
  }
  document.title = 'AllsvenskanAI';
  const cards = S.teams.map(t=>`
    <a class="team-card" href="/lag/${t.id}" onclick="nav(event,'/lag/${t.id}')">
      <img src="${t.image_path||''}" onerror="this.style.opacity='.15'" loading="lazy">
      <div class="tname">${esc(t.name)}</div>
    </a>`).join('');
  el.innerHTML = `
    <div class="page-title"><h1>Allsvenskan 2025</h1><span>${S.teams.length} lag</span></div>
    <div class="team-grid">${cards}</div>`;
}

// ── TEAM PAGE ─────────────────────────────────────────
async function loadTeam(el, teamId) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar lagdata…</div>`;
  try {
    const team = S.teams.find(t=>t.id===teamId)||{id:teamId,name:'',image_path:''};
    document.title = `${team.name} — AllsvenskanAI`;

    // Fetch squad, stats, transfers in parallel
    const [squadD, statsD, transfersD] = await Promise.all([
      sm(`squads/teams/${teamId}`, {include:'player'}),
      sm('statistics/seasons/teams', {season_id: SEASON_ID, team_id: teamId}),
      sm(`transfers/teams/${teamId}`),
    ]);

    const squad = squadD.data || [];
    const stats = (statsD.data||[])[0]?.details || [];
    const transfers = (transfersD.data||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    // Parse stats
    const getStat = (name) => stats.find(s=>s.type?.name===name)?.value?.total || stats.find(s=>s.type?.name===name)?.value || 0;
    const wins = getStat('Wins');
    const draws = getStat('Draws');
    const losses = getStat('Lost');
    const goalsFor = getStat('Goals For');
    const goalsAgainst = getStat('Goals Against');
    const cleanSheets = getStat('Clean Sheets');

    // Group squad by position
    const posOrder = {Goalkeeper:1,Defender:2,Midfielder:3,Attacker:4};
    const posLabel = {Goalkeeper:'Målvakter',Defender:'Försvarare',Midfielder:'Mittfältare',Attacker:'Anfallare'};
    const sorted = [...squad].sort((a,b)=>(posOrder[a.player?.position?.name]||5)-(posOrder[b.player?.position?.name]||5));

    let lastPos = '';
    const playerRows = sorted.map(s => {
      const p = s.player || {};
      const pos = p.position?.name || s.position?.name || '—';
      let header = '';
      if(pos !== lastPos && posLabel[pos]) {
        lastPos = pos;
        header = `<tr class="pos-header"><td colspan="5">${posLabel[pos]||pos}</td></tr>`;
      }
      return header + `<tr class="clickable" onclick="nav(event,'/spelare/${p.id}')">
        <td><div class="player-cell">
          <img src="${p.image_path||''}" onerror="this.style.opacity='.15'" loading="lazy">
          <div><div class="pname">${esc(p.display_name||p.name||'—')}</div>
          <div class="psub">${flag(p.nationality?.name)} ${esc(p.nationality?.name||'')}</div></div>
        </div></td>
        <td><span class="td-pos">${esc(pos)}</span></td>
        <td>${p.date_of_birth ? calcAge(p.date_of_birth)+' år' : '—'}</td>
        <td>${p.height ? p.height+'cm' : '—'}</td>
        <td style="color:var(--gold);font-family:'Bebas Neue',sans-serif">${p.market_value_currency||''} ${p.market_value ? formatVal(p.market_value) : '—'}</td>
      </tr>`;}).join('');

    const transferRows = transfers.slice(0,20).map(tr=>{
      const isIn = tr.to_team_id === teamId;
      const fc = feeClass(tr.type);
      return `<div class="transfer-item">
        <div style="flex:1;min-width:0">
          <div style="font-weight:500;font-size:13px">${esc(tr.player?.display_name||tr.player?.name||'—')}</div>
          <div style="font-size:11px;color:var(--muted)">${tr.date||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:${isIn?'var(--green)':'var(--red)'}">
          <img src="${isIn?(tr.fromTeam?.image_path||''):(tr.toTeam?.image_path||'')}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.15'">
          ${isIn?'↙ IN från <strong>'+esc(tr.fromTeam?.name||'?')+'</strong>':'↗ UT till <strong>'+esc(tr.toTeam?.name||'?')+'</strong>'}
        </div>
        <span class="transfer-type ${fc}">${esc(tr.type||'?')}</span>
      </div>`;}).join('')||'<div class="empty">Inga övergångar hittades</div>';

    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap">
        <button class="back-btn" style="margin-bottom:0" onclick="nav(event,'/')">← Alla lag</button>
        <button class="share-btn" onclick="copyLink()">🔗 Kopiera länk</button>
      </div>
      <div class="page-title"><h1>${esc(team.name)}</h1></div>

      <div class="hero">
        <img class="hero-logo" src="${team.image_path||''}" onerror="this.style.opacity='.15'">
        <div class="hero-info">
          <div class="hero-meta">
            ${team.venue?.name?`<span>🏟 ${esc(team.venue.name)}</span>`:''}
            ${team.venue?.city?`<span>📍 ${esc(team.venue.city)}</span>`:''}
            ${team.venue?.capacity?`<span>👥 ${team.venue.capacity.toLocaleString('sv-SE')} platser</span>`:''}
          </div>
          <div class="stat-row">
            <div class="stat-pill"><div class="n">${wins}</div><div class="l">Vinster</div></div>
            <div class="stat-pill"><div class="n">${draws}</div><div class="l">Oavgjorda</div></div>
            <div class="stat-pill"><div class="n">${losses}</div><div class="l">Förluster</div></div>
            <div class="stat-pill"><div class="n">${goalsFor}</div><div class="l">Gjorda mål</div></div>
            <div class="stat-pill"><div class="n">${goalsAgainst}</div><div class="l">Insläppta</div></div>
            <div class="stat-pill"><div class="n">${cleanSheets}</div><div class="l">Nollor</div></div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'ts')">Spelartrupp (${squad.length})</button>
        <button class="tab" onclick="switchTab(this,'tt')">Övergångar (${transfers.length})</button>
      </div>

      <div id="ts">
        <div class="table-wrap"><div style="overflow-x:auto"><table>

async function loadResults(el) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Hämtar matcher…</div>`;
  document.title = 'Resultat — AllsvenskanAI';
  try {
    const [liveD, recentD] = await Promise.all([
      sm('livescores/inplay', {filters:`fixtureLeagues:${LEAGUE_ID}`, include:'participants;scores'}),
      sm('fixtures', {season_id: SEASON_ID, include:'participants;scores', per_page:50, sort:'-starting_at'}),
    ]);

    const live = liveD.data || [];
    const recent = recentD.data || [];

    const renderMatch = (f, isLive=false) => {
      const home = f.participants?.find(p=>p.meta?.location==='home');
      const away = f.participants?.find(p=>p.meta?.location==='away');
      const homeScore = f.scores?.find(s=>s.participant_id===home?.id&&s.type?.name==='current')?.score?.goals ?? '—';
      const awayScore = f.scores?.find(s=>s.participant_id===away?.id&&s.type?.name==='current')?.score?.goals ?? '—';
      const score = homeScore!=='—'?`${homeScore} – ${awayScore}`:'vs';
      const col = homeScore>awayScore?'var(--green)':homeScore<awayScore?'var(--red)':'var(--muted)';
      return `<tr>
        <td style="font-size:11px;color:var(--muted)">${isLive?'<span class="live-badge">LIVE</span>':(f.starting_at||'').slice(0,10)}</td>
        <td style="text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
          <span style="font-weight:500">${esc(home?.name||'?')}</span>
          <img src="${home?.image_path||''}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.15'">
        </div></td>
        <td class="td-num" style="text-align:center;color:${col}">${score}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <img src="${away?.image_path||''}" style="width:18px;height:18px;object-fit:contain" onerror="this.style.opacity='.15'">
          <span style="font-weight:500">${esc(away?.name||'?')}</span>
        </div></td>
        <td style="font-size:11px;color:var(--muted)">${esc(f.venue?.name||'')}</td>
      </tr>`;};

    const liveSection = live.length ? `
      <div class="page-title" style="margin-top:1rem"><h1>Live</h1><span>${live.length} matcher pågår</span></div>
      <div class="table-wrap"><div style="overflow-x:auto"><table>
        <thead><tr><th>Status</th><th style="text-align:right">Hemma</th><th style="text-align:center">Mål</th><th>Borta</th><th>Arena</th></tr></thead>
        <tbody>${live.map(f=>renderMatch(f,true)).join('')}</tbody>
      </table></div></div>` : '';

    const rows = recent.map(f=>renderMatch(f)).join('');
    el.innerHTML = `
      <div class="page-title"><h1>Resultat & Live</h1></div>
      ${liveSection}
      <div class="page-title" style="margin-top:${live.length?'1.5rem':'0'}"><h1>Senaste matcher</h1></div>
      <div class="table-wrap"><div style="overflow-x:auto"><table>
        <thead><tr><th>Datum</th><th style="text-align:right">Hemma</th><th style="text-align:center">Resultat</th><th>Borta</th><th>Arena</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" class="empty">Inga matcher</td></tr>'}</tbody>
      </table></div></div>`;
  } catch(e) { el.innerHTML = `<div class="err">Fel: ${esc(e.message)}</div>`; }
}

function aiAbout(name,type) {
  nav(null,'/sok'); history.pushState({},'','/sok'); updateNav('/sok');
  loadSearch(document.getElementById('mc'));
  const q = type==='lag'
    ? `Ge mig en fullständig analys av ${name} i Allsvenskan 2025 – form, toppspelare, övergångar och marknadsvärden`
    : `Berätta allt om ${name} – statistik Allsvenskan 2025, marknadsvärde på Transfermarkt, senaste nyheter och transferrykten`;
  setTimeout(()=>askAI(q),100);
}

function askAI(q){const i=document.getElementById('aiInput');if(i){i.value=q;sendAI();}}

async function sendAI() {
  const inp=document.getElementById('aiInput'),msgs=document.getElementById('chatMsgs'),btn=document.getElementById('aiSend');
  if(!inp||S.chatLoading)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  S.chatLoading=true;if(btn)btn.disabled=true;
  const w=msgs?.querySelector('div[style*="text-align:center"]');if(w)w.remove();
  S.chatHistory.push({role:'user',text});
  msgs.innerHTML+=`<div class="msg-user"><div class="msg-role">Du</div><div class="msg-bubble">${esc(text)}</div></div>`;
  const aid='a'+Date.now();
  msgs.innerHTML+=`<div class="msg-ai" id="${aid}"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:11px;color:var(--muted);margin-left:6px">Söker…</span></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYS,messages:S.chatHistory.map(m=>({role:m.role==='user'?'user':'assistant',content:m.role==='assistant'?(m.raw||m.text):m.text}))})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content||[];
    const ansText=raw.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'Inget svar.';
    S.chatHistory.push({role:'assistant',text:ansText,raw});
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble">${mdToHtml(ansText)}</div></div>`;
  }catch(e){
    const ae=document.getElementById(aid);
    if(ae)ae.outerHTML=`<div class="msg-ai"><div class="msg-role">Allsvenskan AI</div><div class="msg-bubble" style="color:#f08080">Fel: ${esc(e.message)}</div></div>`;
    S.chatHistory.pop();
  }
  S.chatLoading=false;if(btn)btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const FLAGS={Sweden:'🇸🇪',Nigeria:'🇳🇬',Ghana:'🇬🇭',Finland:'🇫🇮',Norway:'🇳🇴',Denmark:'🇩🇰',Brazil:'🇧🇷',Argentina:'🇦🇷',England:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',Scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',France:'🇫🇷',Spain:'🇪🇸',Portugal:'🇵🇹',Germany:'🇩🇪',Italy:'🇮🇹',Netherlands:'🇳🇱',Poland:'🇵🇱',Serbia:'🇷🇸',Croatia:'🇭🇷',Kosovo:'🇽🇰',Albania:'🇦🇱',Iceland:'🇮🇸',Ireland:'🇮🇪',USA:'🇺🇸',Senegal:'🇸🇳',Morocco:'🇲🇦',Cameroon:'🇨🇲',Tunisia:'🇹🇳',Mali:'🇲🇱','Ivory Coast':'🇨🇮','Guinea':'🇬🇳','DR Congo':'🇨🇩',Peru:'🇵🇪',Kosovo:'🇽🇰'};
function flag(n){return FLAGS[n]||'🌍';}
function mdToHtml(txt){
  const lines=txt.split('\n');let out='',inT=false;
  for(const line of lines){
    if(/^\|/.test(line)&&/\|$/.test(line.trim())){
      if(!inT){out+='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;margin:8px 0">';inT=true;}
      if(/^[\|\s:-]+$/.test(line.replace(/\|/g,'')))continue;
      const cs=line.split('|').filter((_,i,a)=>i>0&&i<a.length-1);
      out+='<tr>'+cs.map(c=>`<td style="padding:5px 10px;border:1px solid var(--border);font-size:12px">${inl(c.trim())}</td>`).join('')+'</tr>';
    }else{
      if(inT){out+='</table></div>';inT=false;}
      if(/^### /.test(line))out+=`<strong style="font-size:14px;color:var(--gold);display:block;margin:8px 0 3px">${inl(line.slice(4))}</strong>`;
      else if(/^## /.test(line))out+=`<strong style="font-size:15px;color:var(--gold);display:block;margin:10px 0 4px">${inl(line.slice(3))}</strong>`;
      else if(/^# /.test(line))out+=`<strong style="font-size:16px;color:var(--gold);display:block;margin:12px 0 5px">${inl(line.slice(2))}</strong>`;
      else if(/^[-*] /.test(line))out+=`<div style="display:flex;gap:6px;margin:2px 0"><span style="color:var(--gold);flex-shrink:0">•</span>${inl(line.slice(2))}</div>`;
      else if(line.trim()==='')out+='<br>';
      else out+=inl(line)+'<br>';
    }
  }
  if(inT)out+='</table></div>';
  return out;
}
function inl(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
