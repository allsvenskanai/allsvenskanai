<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllsvenskanAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="main-header">
  <div class="header-inner">
    
    <div class="logo-wrap">
      <div class="logo-icon">A</div>
      <div class="logo-text">
        <h1>Allsvenskan<span>AI</span></h1>
        <p>Data. Insikt. Fotboll.</p>
      </div>
    </div>

    <nav class="nav-menu">
      <button class="nav-btn active">Allsvenskan</button>
      <button class="nav-btn">Damallsvenskan</button>
      <button class="nav-btn">Matcher</button>
    </nav>

  </div>
</header>

  <main class="container">
    <section class="league-switcher">
      <button class="league-btn active" data-league="allsvenskan">Allsvenskan</button>
      <button class="league-btn" data-league="damallsvenskan">Damallsvenskan</button>
    </section>

    <section class="card">
      <h2>Tabell</h2>
      <div id="standings-content">Här kommer tabellen att visas.</div>
    </section>

    <section class="card">
      <h2>Resultat</h2>
      <div id="results-content">Här kommer resultat att visas.</div>
    </section>

    <section class="card">
      <h2>Statistik</h2>
      <div id="stats-content">Här kommer statistik att visas.</div>
    </section>
  </main>

  <script src="team-names.js"></script>
  <script src="app.js"></script>
</body>
</html>
